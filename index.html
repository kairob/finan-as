<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Semanal - Finanças Privadas</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        /* --- ESTILOS NATIVOS CSS DE ALTO DESEMPENHO (Premium Dark Theme) --- */
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --bg-input: #020617;
            --border-color: rgba(51, 65, 85, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: rgba(16, 185, 129, 0.1);
            --secondary: #14b8a6;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- CABEÇALHO --- */
        header {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 40;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            font-weight: 800;
            font-size: 20px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-badge {
            font-size: 10px;
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 9999px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* --- BANNER DE ESTADO LOCAL --- */
        .sync-banner {
            background-color: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            color: #cbd5e1;
            font-size: 10px;
            font-weight: 600;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            min-height: 40px;
            flex-shrink: 0;
        }

        .sync-banner-text {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            line-height: 1.4;
            flex: 1;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            display: inline-block;
            flex-shrink: 0;
        }

        /* Botão de Exportação */
        .btn-export {
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--primary);
            font-size: 9px;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-export:hover {
            background-color: var(--primary);
            color: #020617;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 112px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        main::-webkit-scrollbar {
            display: none;
        }

        /* --- CARDS E MÉTRICAS --- */
        .meta-card {
            background: linear-gradient(135deg, var(--bg-card), #061510);
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }

        .meta-card-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
        }

        .meta-card-value {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 8px;
        }

        .meta-card-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .summary-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
        }

        .summary-card {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 16px;
        }

        .summary-label {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 4px;
            display: block;
        }

        .section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(51, 65, 85, 0.8);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
        }

        .item-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .item-title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .status-dot.green { background-color: var(--primary); }
        .status-dot.amber { background-color: var(--accent-amber); }
        .status-dot.rose { background-color: var(--accent-rose); }

        .item-title {
            font-size: 14px;
            font-weight: 800;
            color: #ffffff;
            word-break: break-all;
        }

        .item-subtitle {
            font-size: 10px;
            color: var(--text-muted);
        }

        .item-value-side {
            text-align: right;
            flex-shrink: 0;
        }

        .item-value-label {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .item-value-main {
            font-size: 14px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .info-grid {
            background-color: #020617;
            padding: 12px;
            border-radius: 12px;
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 8px;
            font-size: 12px;
        }

        .info-grid-3 {
            background-color: #020617;
            padding: 12px;
            border-radius: 12px;
            display: grid;
            grid-template-cols: 1fr 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            text-align: center;
        }

        .info-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-grid-label {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .info-grid-value {
            font-weight: 700;
            color: #cbd5e1;
            font-size: 11px;
            word-break: break-all;
        }
        .info-grid-value.teal { color: var(--secondary); }
        .info-grid-value.emerald { color: var(--primary); }

        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }

        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #cbd5e1; }

        /* --- CONTROLES DE AÇÕES DOS CARTÕES --- */
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            font-size: 12px;
        }

        @media (min-width: 480px) {
            .card-actions {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .meta-base-text {
            color: var(--text-muted);
            line-height: 1.4;
        }

        .meta-base-value {
            color: var(--primary);
            font-weight: 800;
        }

        .action-button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
        }

        @media (min-width: 480px) {
            .action-button-group {
                width: auto;
                justify-content: flex-end;
            }
        }

        .btn-action {
            flex: 1;
            min-width: 65px;
            padding: 8px 6px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-align: center;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 32px;
        }

        .btn-action.pay {
            flex: 1.4 1 auto;
        }

        @media (min-width: 480px) {
            .btn-action {
                flex: none;
                min-width: 80px;
                padding: 8px 12px;
            }
            .btn-action.pay {
                flex: none;
                min-width: 120px;
            }
        }

        .btn-action.edit { background-color: rgba(51, 65, 85, 0.8); color: #cbd5e1; }
        .btn-action.delete { background-color: rgba(244, 63, 94, 0.1); color: var(--accent-rose); border: 1px solid rgba(244, 63, 94, 0.2); }
        .btn-action.pay { background-color: rgba(20, 184, 166, 0.15); color: var(--secondary); border: 1px solid rgba(20, 184, 166, 0.3); }

        /* --- ELEMENTOS DO LIVRO DIÁRIO --- */
        .journal-badge {
            font-size: 9px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
        }
        .journal-badge.criacao { background-color: rgba(16, 185, 129, 0.15); color: var(--primary); }
        .journal-badge.edicao { background-color: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }
        .journal-badge.remocao { background-color: rgba(244, 63, 94, 0.15); color: var(--accent-rose); }
        .journal-badge.adiantamento { background-color: rgba(20, 184, 166, 0.15); color: var(--secondary); }

        /* --- CONTROLES DE MARGEM INTERATIVOS --- */
        .margin-controller-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px dashed var(--border-color);
            padding: 12px 16px;
            border-radius: 16px;
            gap: 12px;
        }

        .margin-controller-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .margin-controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-margin-adjust {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: #ffffff;
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease;
        }

        .btn-margin-adjust:active {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .margin-display-value {
            font-size: 13px;
            font-weight: 800;
            color: var(--secondary);
            min-width: 45px;
            text-align: center;
        }

        /* --- NAVEGAÇÃO INFERIOR --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            padding: 8px 8px 12px 8px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 40;
            gap: 2px;
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            width: 58px;
        }

        .nav-btn.active { color: var(--primary); }
        .nav-btn span { font-size: 9px; font-weight: 700; margin-top: 4px; }
        .nav-btn-icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        .nav-add-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-12px);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
            flex-shrink: 0;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 448px;
            border-radius: 24px 24px 0 0;
            padding: 24px;
            border: 1px solid var(--border-color);
            transform: translateY(100%);
            transition: transform 0.3s ease;
        }
        .modal-overlay.open .modal-container { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 16px; }
        .modal-title { font-size: 16px; font-weight: 700; color: #ffffff; }
        .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .modal-tabs { display: flex; background-color: var(--bg-main); padding: 4px; border-radius: 12px; margin-bottom: 16px; gap: 4px; }
        .modal-tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); font-size: 12px; font-weight: 700; padding: 8px; border-radius: 8px; cursor: pointer; }
        .modal-tab-btn.active { background-color: var(--primary); color: #020617; }

        /* Formulários */
        .form-group { margin-bottom: 14px; }
        .form-grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 12px; }
        .form-label { display: block; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
        .form-control { width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 12px; padding: 12px; color: #ffffff; font-size: 14px; outline: none; }

        .btn-submit {
            width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 12px; color: #020617; font-size: 13px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 12px;
        }

        .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background-color: #0f172a; color: var(--primary); font-size: 12px; font-weight: 700; padding: 12px 20px; border-radius: 12px; border: 1px solid rgba(16, 185, 129, 0.2); z-index: 100; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
        .toast.show { opacity: 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <div class="header-logo">$</div>
            <div>
                <h1 class="header-title">Meta Semanal</h1>
                <p class="header-subtitle">Planejamento Exato por Data</p>
            </div>
        </div>
        <div class="header-badge" id="current-badge-date">Mês Corrente</div>
    </header>

    <div id="sync-status-banner" class="sync-banner">
        <div class="sync-banner-text">
            <span class="sync-dot"></span>
            <span>Armazenamento Local Seguro (Privado &amp; Offline)</span>
        </div>
        <button class="btn-export" onclick="exportDataToExcel()">
            <svg style="width:11px; height:11px; fill:currentColor" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
            </svg>
            Excel
        </button>
    </div>

    <main id="main-content">
        </main>

    <nav>
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active">
            <svg class="nav-btn-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
            <span>Painel</span>
        </button>
        <button onclick="switchTab('cartoes')" id="nav-cartoes" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
            <span>Cartões</span>
        </button>
        <button onclick="switchTab('partilhas')" id="nav-partilhas" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
            <span>Partilhas</span>
        </button>
        <button onclick="switchTab('diario')" id="nav-diario" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            <span>Diário</span>
        </button>
        <button onclick="openAddModal()" class="nav-add-btn">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
    </nav>

    <div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Novo Registro</h3>
                <button onclick="closeAddModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="modal-tabs">
                <button type="button" onclick="setModalType('cartao')" id="m-tab-cartao" class="modal-tab-btn active">Cartão/Despesa</button>
                <button type="button" onclick="setModalType('partilha')" id="m-tab-partilha" class="modal-tab-btn">Partilha</button>
            </div>
            <form id="modal-form" onsubmit="saveRecord(event)">
                <div id="form-fields"></div>
                <button type="submit" class="btn-submit">Confirmar Salvar</button>
            </form>
        </div>
    </div>

    <div id="pay-modal" class="modal-overlay" onclick="handlePayOverlayClick(event)">
        <div class="modal-container" style="border-radius: 24px; padding: 24px;">
            <div class="modal-header">
                <h3 class="modal-title">Registrar Adiantamento (Débito/Pix)</h3>
                <button onclick="closePayModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="pay-form" onsubmit="submitPayment(event)">
                <input type="hidden" id="pay-card-id">
                <div class="form-group">
                    <label class="form-label" id="pay-card-label">Cartão: -</label>
                    <input type="number" step="0.01" id="pay-amount" required class="form-control" placeholder="Valor a adiantar (R$)">
                </div>
                <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, var(--secondary), var(--primary));">Confirmar Pagamento</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toast-msg">Salvo!</span></div>

    <script>
        // 🛡️ DADOS INICIAIS VAZIOS (Para privacidade por omissão no seu GitHub público)
        const initialCards = [];
        const initialLoans = [];
        const initialHistory = [
            { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Sistema de Livro Diário inicializado com sucesso.', amount: 0 }
        ];

        // Estado carregado diretamente do armazenamento local (localStorage)
        let state = {
            cards: JSON.parse(localStorage.getItem('w_cards_exact_v2')) || initialCards,
            loans: JSON.parse(localStorage.getItem('w_loans_exact_v2')) || initialLoans,
            history: JSON.parse(localStorage.getItem('w_history_exact_v2')) || initialHistory,
            currentTab: 'dashboard',
            modalType: 'cartao',
            editingId: null,
            safetyMargin: parseFloat(localStorage.getItem('w_safety_margin_v2')) !== null && !isNaN(parseFloat(localStorage.getItem('w_safety_margin_v2'))) ? parseFloat(localStorage.getItem('w_safety_margin_v2')) : 0.25 // Margem padrão de 25% (0.25)
        };

        function getRealTodayString() {
            const todayReal = new Date();
            const yearReal = todayReal.getFullYear();
            const monthReal = String(todayReal.getMonth() + 1).padStart(2, '0');
            const dayReal = String(todayReal.getDate()).padStart(2, '0');
            return `${yearReal}-${monthReal}-${dayReal}`;
        }

        let simulatedTodayStr = localStorage.getItem('simulated_today') || getRealTodayString();

        function saveState() {
            localStorage.setItem('w_cards_exact_v2', JSON.stringify(state.cards));
            localStorage.setItem('w_loans_exact_v2', JSON.stringify(state.loans));
            localStorage.setItem('w_history_exact_v2', JSON.stringify(state.history));
            localStorage.setItem('w_safety_margin_v2', state.safetyMargin.toString());
            localStorage.setItem('simulated_today', simulatedTodayStr);
        }

        // Função para acrescentar entradas no Livro Diário de forma cronológica
        function logToJournal(type, description, amount) {
            const timestamp = new Date().toLocaleString('pt-BR');
            state.history.unshift({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                date: timestamp,
                type: type,
                description: description,
                amount: parseFloat(amount)
            });
            saveState();
        }

        function formatBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateSimulatedToday(val) {
            simulatedTodayStr = val;
            saveState();
            const dateObj = new Date(simulatedTodayStr + 'T00:00:00');
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('current-badge-date').textContent = `${monthNames[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
            renderActiveTab();
        }

        // Ajuste dinâmico da margem de segurança (+ ou - 5%)
        window.adjustSafetyMargin = function(increment) {
            let currentPercentage = Math.round(state.safetyMargin * 100);
            let newPercentage = currentPercentage + (increment ? 5 : -5);
            
            // Limitador seguro (De 0% até 100%)
            if (newPercentage < 0) newPercentage = 0;
            if (newPercentage > 100) newPercentage = 100;
            
            state.safetyMargin = newPercentage / 100;
            saveState();
            renderActiveTab();
            showToast(`Margem de segurança ajustada para ${newPercentage}%`);
        };

        // --- CALCULA A DATA DE VENCIMENTO DO PRÓXIMO CICLO COM ROLLOVER INTELIGENTE ---
        function getNextDueDate(dueDay, today) {
            let year = today.getFullYear();
            let month = today.getMonth(); // 0-11
            
            let candidate = new Date(year, month, dueDay, 0, 0, 0);
            
            const diffTime = candidate - today;
            const diffDays = diffTime / (1000 * 60 * 60 * 24);
            
            // Rollover protetor para que a meta não dobre se faltar menos de 7 dias para vencer
            if (candidate < today || diffDays < 7) {
                candidate = new Date(year, month + 1, dueDay, 0, 0, 0);
            }
            return candidate;
        }

        function runCalculations() {
            const today = new Date(simulatedTodayStr + 'T00:00:00');
            const cardLoans = { NIO: 0, MP: 0, SAN: 0, PP: 0 };

            state.loans.forEach(l => {
                cardLoans.MP += parseFloat(l.MP || 0);
                cardLoans.PP += parseFloat(l.PP || 0);
                cardLoans.SAN += parseFloat(l.SAN || 0);
                cardLoans.NIO += parseFloat(l.NIO || 0);
            });

            let totalWeeklyMeta = 0;
            let totalPrepaid = 0;

            const processedCards = state.cards.map(c => {
                let loansOnThisCard = 0;
                const nameUpper = c.name.toUpperCase();
                
                if (nameUpper.includes('NIO')) loansOnThisCard = cardLoans.NIO;
                else if (nameUpper.includes('MERCADO') || nameUpper.includes('MP')) loansOnThisCard = cardLoans.MP;
                else if (nameUpper.includes('SANTANDER') || nameUpper.includes('SAN')) loansOnThisCard = cardLoans.SAN;
                else if (nameUpper.includes('PICPAY') || nameUpper.includes('PP')) loansOnThisCard = cardLoans.PP;

                // Captura o valor já adiantado/pago via débito ou pix
                const prepaidAmount = parseFloat(c.prepaid || 0);
                totalPrepaid += prepaidAmount;

                // A parcela líquida é: Total - O que os devedores devem - O que já adiantou via débito/pix
                let myShare = c.totalBill - loansOnThisCard - prepaidAmount;
                if (myShare < 0) myShare = 0;
                
                const computedDueDate = getNextDueDate(c.dueDay, today);
                
                const diffTime = computedDueDate - today;
                let diffDays = diffTime / (1000 * 60 * 60 * 24);
                let calculatedWeeks = diffDays / 7;
                
                if (calculatedWeeks < 1.0) {
                    calculatedWeeks = 1.0; 
                }

                const weeklyContribution = myShare / calculatedWeeks;
                totalWeeklyMeta += weeklyContribution;

                return {
                    ...c, 
                    loansTotal: loansOnThisCard, 
                    prepaidAmount,
                    myShare, 
                    computedDueDate,
                    daysRemaining: diffDays, 
                    calculatedWeeks: calculatedWeeks, 
                    weeklyTarget: weeklyContribution
                };
            });

            const baseWeeklyMeta = totalWeeklyMeta;
            // Aplica a margem de segurança configurável do estado
            const marginAddition = totalWeeklyMeta * state.safetyMargin; 
            const totalWeeklyMetaWithMargin = totalWeeklyMeta * (1 + state.safetyMargin);

            return { 
                processedCards, 
                baseWeeklyMeta,
                marginAddition,
                totalWeeklyMeta: totalWeeklyMetaWithMargin, 
                cardLoans,
                totalPrepaid
            };
        }

        function switchTab(tab) {
            state.currentTab = tab;
            ['nav-dashboard', 'nav-cartoes', 'nav-partilhas', 'nav-diario'].forEach(id => {
                document.getElementById(id).classList.remove('active');
            });
            document.getElementById(`nav-${tab}`).classList.add('active');
            renderActiveTab();
        }

        function renderActiveTab() {
            const container = document.getElementById('main-content');
            if (!container) return;
            const data = runCalculations();
            container.innerHTML = '';

            if (state.currentTab === 'dashboard') {
                renderDashboard(container, data);
            } else if (state.currentTab === 'cartoes') {
                renderCartoes(container, data);
            } else if (state.currentTab === 'partilhas') {
                renderPartilhas(container, data);
            } else if (state.currentTab === 'diario') {
                renderDiario(container);
            }
        }

        function renderDashboard(container, data) {
            const totalFaturasTotal = state.cards.reduce((sum, c) => sum + c.totalBill, 0);
            const totalEmprestimos = Object.values(data.cardLoans).reduce((a, b) => a + b, 0);
            const marginPercent = Math.round(state.safetyMargin * 100);

            container.innerHTML = `
                <div class="meta-card">
                    <span class="meta-card-label">Meta Semanal (Com Margem)</span>
                    <h2 class="meta-card-value">${formatBRL(data.totalWeeklyMeta)}</h2>
                    <p class="meta-card-desc">Cálculo contínuo com acréscimo de +${marginPercent}% de margem.</p>
                </div>
                
                <div class="margin-controller-container">
                    <span class="margin-controller-label">Margem de Segurança:</span>
                    <div class="margin-controls-group">
                        <div class="btn-margin-adjust" onclick="adjustSafetyMargin(false)">-</div>
                        <span class="margin-display-value">${marginPercent}%</span>
                        <div class="btn-margin-adjust" onclick="adjustSafetyMargin(true)">+</div>
                    </div>
                </div>

                <div class="summary-grid">
                    <div class="summary-card">
                        <span class="summary-label">Meta Faturas (Base)</span>
                        <span class="summary-value" style="font-size: 15px; color: #f1f5f9;">${formatBRL(data.baseWeeklyMeta)}</span>
                    </div>
                    <div class="summary-card">
                        <span class="summary-label">Margem de Segurança (+${marginPercent}%)</span>
                        <span class="summary-value" style="font-size: 15px; color: var(--secondary);">${formatBRL(data.marginAddition)}</span>
                    </div>
                </div>

                <div class="summary-grid" style="grid-template-cols: 1fr 1fr 1fr; gap: 8px;">
                    <div class="summary-card" style="padding: 12px 8px;">
                        <span class="summary-label" style="font-size: 8px;">Faturas</span>
                        <span class="summary-value" style="font-size: 13px;">${formatBRL(totalFaturasTotal)}</span>
                    </div>
                    <div class="summary-card" style="padding: 12px 8px;">
                        <span class="summary-label" style="font-size: 8px; color: var(--secondary);">Devedores</span>
                        <span class="summary-value" style="font-size: 13px; color: var(--secondary);">${formatBRL(totalEmprestimos)}</span>
                    </div>
                    <div class="summary-card" style="padding: 12px 8px; background-color: rgba(20, 184, 166, 0.08); border-color: rgba(20, 184, 166, 0.2);">
                        <span class="summary-label" style="font-size: 8px; color: var(--secondary);">Adiantado</span>
                        <span class="summary-value" style="font-size: 13px; color: var(--secondary);">${formatBRL(data.totalPrepaid)}</span>
                    </div>
                </div>
                
                <div class="list-container">
                    <h3 class="section-title">Esforço Semanal Requerido</h3>
                    ${state.cards.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum cartão adicionado. Clique no botão "+" abaixo para começar!
                        </div>
                    ` : data.processedCards.map(c => {
                        let color = c.daysRemaining < 0 ? 'rose' : (c.daysRemaining <= 7 ? 'amber' : 'green');
                        return `
                            <div class="item-card" style="flex-direction: row; justify-content: space-between; align-items: center; padding: 14px 16px;">
                                <div>
                                    <div class="item-title-wrapper"><span class="status-dot ${color}"></span><span class="item-title">${c.name}</span></div>
                                    <span class="item-subtitle" style="display: block; margin-left: 18px;">Ciclo Ativo: ${c.calculatedWeeks.toFixed(2)}s restantes (${Math.ceil(c.daysRemaining)} dias)</span>
                                </div>
                                <div style="text-align: right;">
                                    <span class="item-value-main" style="color: var(--primary); font-size: 15px; font-weight: 800;">${formatBRL(c.weeklyTarget)}/sem</span>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderCartoes(container, data) {
            container.innerHTML = `
                <div class="list-container">
                    ${state.cards.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum cartão cadastrado. Clique no botão "+" abaixo para adicionar o seu primeiro cartão!
                        </div>
                    ` : data.processedCards.map(c => `
                        <div class="item-card">
                            <div class="item-card-header">
                                <div>
                                    <h3 class="item-title">${c.name}</h3>
                                    <span class="item-subtitle">Próximo Vencimento: ${c.computedDueDate.toLocaleDateString('pt-BR')} (Dia ${c.dueDay})</span>
                                </div>
                                <div class="item-value-side"><span class="item-value-label">Total</span><span class="item-value-main">${formatBRL(c.totalBill)}</span></div>
                            </div>
                            <div class="info-grid-3">
                                <div class="info-cell"><span class="info-grid-label">Parcerias</span><span class="info-grid-value teal">${formatBRL(c.loansTotal)}</span></div>
                                <div class="info-cell"><span class="info-grid-label">Adiantado</span><span class="info-grid-value emerald" style="color: var(--secondary);">${formatBRL(c.prepaidAmount)}</span></div>
                                <div class="info-cell"><span class="info-grid-label">Líquido em Aberto</span><span class="info-grid-value" style="color: #cbd5e1;">${formatBRL(c.myShare)}</span></div>
                            </div>
                            <div class="card-actions">
                                <span class="meta-base-text">Meta Base: <strong class="meta-base-value">${formatBRL(c.weeklyTarget)}/sem</strong></span>
                                <div class="action-button-group">
                                    <button onclick="openPayModal('${c.id}', '${c.name}')" class="btn-action pay">Adiantar (Débito)</button>
                                    <button onclick="editCard('${c.id}')" class="btn-action edit">Editar</button>
                                    <button onclick="deleteCard('${c.id}')" class="btn-action delete">Remover</button>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderPartilhas(container, data) {
            container.innerHTML = `
                <div class="list-container">
                    ${state.loans.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhuma partilha registrada. Clique no botão "+" e mude para a aba de "Partilha" para registrar quem te deve!
                        </div>
                    ` : state.loans.map(l => {
                        const total = parseFloat(l.MP || 0) + parseFloat(l.PP || 0) + parseFloat(l.SAN || 0) + parseFloat(l.NIO || 0);
                        return `
                            <div class="item-card">
                                <div class="item-card-header">
                                    <h3 class="item-title">${l.name}</h3>
                                    <span class="item-value-main" style="color: var(--secondary);">${formatBRL(total)}</span>
                                </div>
                                <div class="info-grid">
                                    <div class="info-row"><span>MP:</span><span>${formatBRL(l.MP)}</span></div>
                                    <div class="info-row"><span>PicPay:</span><span>${formatBRL(l.PP)}</span></div>
                                    <div class="info-row"><span>Santander:</span><span>${formatBRL(l.SAN)}</span></div>
                                    <div class="info-row"><span>Nio:</span><span>${formatBRL(l.NIO)}</span></div>
                                </div>
                                <div class="card-actions" style="justify-content: flex-end;">
                                    <div class="action-button-group">
                                        <button onclick="editLoan('${l.id}')" class="btn-action edit">Editar</button>
                                        <button onclick="deleteLoan('${l.id}')" class="btn-action delete">Remover</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        // --- RENDERIZAR O LIVRO DIÁRIO ---
        function renderDiario(container) {
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <h3 class="section-title" style="margin: 0;">Registro Cronológico de Ações</h3>
                    <button class="btn-action delete" style="padding: 6px 12px; font-size: 10px; min-width: auto; flex: none" onclick="clearJournal()">Limpar Diário</button>
                </div>
                <div class="list-container">
                    ${state.history.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum registro no diário ainda. Todas as suas despesas e pagamentos aparecerão aqui automaticamente!
                        </div>
                    ` : state.history.map(h => `
                        <div class="item-card" style="padding: 14px; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="journal-badge ${h.type}">${h.type}</span>
                                <span style="font-size: 9px; color: var(--text-muted); font-weight: 700;">${h.date}</span>
                            </div>
                            <p style="font-size: 13px; color: #f1f5f9; line-height: 1.4;">${h.description}</p>
                            ${h.amount !== 0 ? `
                                <div style="text-align: right; font-size: 12px; font-weight: 800; color: ${h.amount > 0 ? 'var(--primary)' : 'var(--accent-rose)'}">
                                    ${h.amount > 0 ? '+' : ''}${formatBRL(h.amount)}
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Limpar o diário com confirmação
        window.clearJournal = function() {
            if (confirm("Tem certeza de que deseja limpar permanentemente todo o histórico do Livro Diário?")) {
                state.history = [
                    { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Livro Diário limpo pelo usuário.', amount: 0 }
                ];
                saveState();
                renderActiveTab();
                showToast("Histórico limpo!");
            }
        }

        // --- EXPORTAR DADOS DIRETAMENTE PARA EXCEL (.XLSX) COM 3 ABAS ---
        window.exportDataToExcel = function() {
            if (state.cards.length === 0 && state.loans.length === 0 && state.history.length === 0) {
                showToast("Adicione dados para poder exportar para o Excel!");
                return;
            }

            try {
                const calcs = runCalculations();
                const wb = XLSX.utils.book_new();

                // 1. Criar dados para a primeira aba: "Resumo & Cartões"
                const summaryHeader = [
                    ["GESTOR FINANCEIRO - METAS SEMANAIS"],
                    ["Data da Exportação", new Date().toLocaleDateString('pt-BR')],
                    [],
                    ["MÉTRICAS GERAIS"],
                    ["Minha Meta Semanal (Com Margem)", calcs.totalWeeklyMeta],
                    ["Meta Base (Faturas)", calcs.baseWeeklyMeta],
                    [`Margem de Segurança Adicional (${Math.round(state.safetyMargin * 100)}%)`, calcs.marginAddition],
                    ["Faturas Totais Brutas", state.cards.reduce((sum, c) => sum + c.totalBill, 0)],
                    ["Total de Parcerias (Devedores)", Object.values(calcs.cardLoans).reduce((a, b) => a + b, 0)],
                    ["Total Pago/Adiantado (Débito)", calcs.totalPrepaid],
                    [],
                    ["DETALHE DE CARTÕES & DESPESAS"],
                    ["Cartão/Despesa", "Fatura Bruta (R$)", "Dia Vencimento", "Próximo Vencimento", "Parcerias (R$)", "Adiantado (R$)", "Líquido em Aberto (R$)", "Semanas Restantes", "Meta Semanal (R$)"]
                ];

                calcs.processedCards.forEach(c => {
                    summaryHeader.push([
                        c.name,
                        c.totalBill,
                        c.dueDay,
                        c.computedDueDate.toLocaleDateString('pt-BR'),
                        c.loansTotal,
                        c.prepaidAmount,
                        c.myShare,
                        parseFloat(c.calculatedWeeks.toFixed(2)),
                        parseFloat(c.weeklyTarget.toFixed(2))
                    ]);
                });

                const wsSummary = XLSX.utils.aoa_to_sheet(summaryHeader);
                XLSX.utils.book_append_sheet(wb, wsSummary, "Resumo & Cartões");

                // 2. Criar dados para a segunda aba: "Partilhas (Devedores)"
                const loansHeader = [
                    ["PARTILHAS & CONTROLE DE DEVEDORES"],
                    [],
                    ["Nome do Devedor", "Mercado Pago (R$)", "PicPay (R$)", "Santander (R$)", "Nio (R$)", "Total Devedor (R$)"]
                ];

                state.loans.forEach(l => {
                    const totalDevedor = parseFloat(l.MP || 0) + parseFloat(l.PP || 0) + parseFloat(l.SAN || 0) + parseFloat(l.NIO || 0);
                    loansHeader.push([
                        l.name,
                        parseFloat(l.MP || 0),
                        parseFloat(l.PP || 0),
                        parseFloat(l.SAN || 0),
                        parseFloat(l.NIO || 0),
                        totalDevedor
                    ]);
                });

                if (state.loans.length > 0) {
                    const totalMP = state.loans.reduce((sum, l) => sum + parseFloat(l.MP || 0), 0);
                    const totalPP = state.loans.reduce((sum, l) => sum + parseFloat(l.PP || 0), 0);
                    const totalSAN = state.loans.reduce((sum, l) => sum + parseFloat(l.SAN || 0), 0);
                    const totalNIO = state.loans.reduce((sum, l) => sum + parseFloat(l.NIO || 0), 0);
                    const totalGeral = totalMP + totalPP + totalSAN + totalNIO;
                    
                    loansHeader.push([]);
                    loansHeader.push(["TOTAL DE PARCERIAS", totalMP, totalPP, totalSAN, totalNIO, totalGeral]);
                }

                const wsLoans = XLSX.utils.aoa_to_sheet(loansHeader);
                XLSX.utils.book_append_sheet(wb, wsLoans, "Partilhas (Devedores)");

                // 3. Criar dados para a terceira aba: "Livro Diário"
                const journalHeader = [
                    ["LIVRO DIÁRIO - REGISTRO DE TRANSAÇÕES"],
                    ["Arquivo auditado cronologicamente"],
                    [],
                    ["Data/Hora", "Tipo de Ação", "Descrição do Evento", "Valor Associado (R$)"]
                ];

                state.history.forEach(h => {
                    journalHeader.push([
                        h.date,
                        h.type.toUpperCase(),
                        h.description,
                        h.amount
                    ]);
                });

                const wsJournal = XLSX.utils.aoa_to_sheet(journalHeader);
                XLSX.utils.book_append_sheet(wb, wsJournal, "Livro Diário");

                // Configuração da data no formato dd_mm_aaaa para o nome do arquivo
                const d = new Date();
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const formattedDate = `${day}_${month}_${year}`;

                // Gerar e descarregar o arquivo .xlsx completo com a nova formatação de data
                XLSX.writeFile(wb, `Gestor_Financas_Completo_${formattedDate}.xlsx`);
                showToast("Arquivo Excel (3 abas) exportado com sucesso!");
            } catch (err) {
                console.error("Erro na exportação Excel:", err);
                showToast("Erro ao gerar o arquivo Excel.");
            }
        }

        // --- SISTEMA DE MODAL DE CRIAÇÃO / EDIÇÃO GERAL ---
        window.openAddModal = function() { state.editingId = null; setModalType('cartao'); document.getElementById('modal').classList.add('open'); }
        window.closeAddModal = function() { document.getElementById('modal').classList.remove('open'); }
        window.handleOverlayClick = function(e) { if(e.target.id === 'modal') closeAddModal(); }

        window.setModalType = function(type) {
            state.modalType = type;
            document.getElementById('m-tab-cartao').classList.toggle('active', type === 'cartao');
            document.getElementById('m-tab-partilha').classList.toggle('active', type === 'partilha');
            
            const fields = document.getElementById('form-fields');
            if (type === 'cartao') {
                fields.innerHTML = `
                    <div class="form-group"><label class="form-label">Nome do Cartão/Despesa</label><input type="text" id="c-name" required class="form-control" placeholder="Ex: CARRO"></div>
                    <div class="form-grid-2">
                        <div class="form-group"><label class="form-label">Fatura Total (R$)</label><input type="number" step="0.01" id="c-bill" required class="form-control" placeholder="0.00"></div>
                        <div class="form-group"><label class="form-label">Vencimento (Dia 1-31)</label><input type="number" min="1" max="31" id="c-day" required class="form-control" placeholder="Ex: 10"></div>
                    </div>
                    <div class="form-group" style="margin-top: 6px;">
                        <label class="form-label">Valor Já Pago/Adiantado (R$)</label>
                        <input type="number" step="0.01" id="c-prepaid" class="form-control" value="0" placeholder="Para adiantamentos em débito/pix">
                    </div>`;
            } else {
                fields.innerHTML = `
                    <div class="form-group"><label class="form-label">Nome do Devedor</label><input type="text" id="l-name" required class="form-control" placeholder="Ex: ANGELA"></div>
                    <div class="form-grid-2">
                        <div class="form-group"><label class="form-label">Mercado Pago</label><input type="number" step="0.01" id="l-mp" class="form-control" value="0"></div>
                        <div class="form-group"><label class="form-label">PicPay</label><input type="number" step="0.01" id="l-pp" class="form-control" value="0"></div>
                        <div class="form-group"><label class="form-label">Santander</label><input type="number" step="0.01" id="l-san" class="form-control" value="0"></div>
                        <div class="form-group"><label class="form-label">Nio</label><input type="number" step="0.01" id="l-nio" class="form-control" value="0"></div>
                    </div>`;
            }
        }

        window.saveRecord = function(e) {
            e.preventDefault();
            if (state.modalType === 'cartao') {
                const name = document.getElementById('c-name').value.toUpperCase();
                const totalBill = parseFloat(document.getElementById('c-bill').value);
                const dueDay = parseInt(document.getElementById('c-day').value);
                const prepaid = parseFloat(document.getElementById('c-prepaid').value) || 0;
                
                if(state.editingId) {
                    const idx = state.cards.findIndex(c => c.id === state.editingId);
                    const oldCard = state.cards[idx];
                    state.cards[idx] = { id: state.editingId, name, totalBill, dueDay, prepaid };
                    logToJournal('edicao', `Alteração do cartão ${name}. Fatura: ${formatBRL(totalBill)}, Adiantado: ${formatBRL(prepaid)}.`, totalBill - oldCard.totalBill);
                } else {
                    state.cards.push({ id: Date.now().toString(), name, totalBill, dueDay, prepaid });
                    logToJournal('criacao', `Criação do cartão/despesa ${name} com vencimento no dia ${dueDay}.`, totalBill);
                    if (prepaid > 0) {
                        logToJournal('adiantamento', `Adiantamento registrado na criação do cartão ${name}.`, prepaid);
                    }
                }
                switchTab('cartoes');
            } else {
                const name = document.getElementById('l-name').value.toUpperCase();
                const MP = parseFloat(document.getElementById('l-mp').value) || 0;
                const PP = parseFloat(document.getElementById('l-pp').value) || 0;
                const SAN = parseFloat(document.getElementById('l-san').value) || 0;
                const NIO = parseFloat(document.getElementById('l-nio').value) || 0;
                const sum = MP + PP + SAN + NIO;

                if(state.editingId) {
                    const idx = state.loans.findIndex(l => l.id === state.editingId);
                    state.loans[idx] = { id: state.editingId, name, MP, PP, SAN, NIO };
                    logToJournal('edicao', `Atualização da partilha de ${name}. Total devedor: ${formatBRL(sum)}.`, sum);
                } else {
                    state.loans.push({ id: Date.now().toString(), name, MP, PP, SAN, NIO });
                    logToJournal('criacao', `Nova partilha registrada para ${name}. Valor em dívida: ${formatBRL(sum)}.`, sum);
                }
                switchTab('partilhas');
            }
            saveState();
            closeAddModal();
            showToast('Salvo com sucesso!');
        }

        window.editCard = function(id) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            openAddModal(); state.editingId = id; setModalType('cartao');
            document.getElementById('c-name').value = c.name;
            document.getElementById('c-bill').value = c.totalBill;
            document.getElementById('c-day').value = c.dueDay;
            document.getElementById('c-prepaid').value = c.prepaid || 0;
        }

        window.deleteCard = function(id) {
            const c = state.cards.find(i => i.id === id);
            if (c && confirm(`Deseja remover o cartão ${c.name}?`)) {
                logToJournal('remocao', `Remoção permanente do cartão ${c.name}.`, -c.totalBill);
                state.cards = state.cards.filter(i => i.id !== id);
                saveState();
                renderActiveTab();
            }
        }

        window.editLoan = function(id) {
            const l = state.loans.find(item => item.id === id);
            if (!l) return;
            openAddModal(); state.editingId = id; setModalType('partilha');
            document.getElementById('l-name').value = l.name;
            document.getElementById('l-mp').value = l.MP;
            document.getElementById('l-pp').value = l.PP;
            document.getElementById('l-san').value = l.SAN;
            document.getElementById('l-nio').value = l.NIO;
        }

        window.deleteLoan = function(id) {
            const loanObj = state.loans.find(i => i.id === id);
            if (loanObj && confirm(`Remover devedor ${loanObj.name}?`)) {
                const total = parseFloat(loanObj.MP || 0) + parseFloat(loanObj.PP || 0) + parseFloat(loanObj.SAN || 0) + parseFloat(loanObj.NIO || 0);
                logToJournal('remocao', `Remoção do registro de devedor: ${loanObj.name}.`, -total);
                state.loans = state.loans.filter(i => i.id !== id);
                saveState();
                renderActiveTab();
            }
        }

        // --- SISTEMA DE MODAL DE ADIANTAMENTO RÁPIDO (DÉBITO/PIX) ---
        window.openPayModal = function(id, name) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            document.getElementById('pay-card-id').value = id;
            document.getElementById('pay-card-label').textContent = `Adiantar Cartão: ${name} (Fatura Atual: ${formatBRL(c.totalBill)})`;
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-modal').classList.add('open');
        }

        window.closePayModal = function() {
            document.getElementById('pay-modal').classList.remove('open');
        }

        window.handlePayOverlayClick = function(e) {
            if (e.target.id === 'pay-modal') closePayModal();
        }

        window.submitPayment = function(e) {
            e.preventDefault();
            const id = document.getElementById('pay-card-id').value;
            const amount = parseFloat(document.getElementById('pay-amount').value) || 0;

            const idx = state.cards.findIndex(c => c.id === id);
            if (idx !== -1) {
                const currentPrepaid = parseFloat(state.cards[idx].prepaid || 0);
                state.cards[idx].prepaid = currentPrepaid + amount;
                
                // Grava a transação no diário
                logToJournal('adiantamento', `Adiantamento via Débito/Pix efetuado no cartão ${state.cards[idx].name}.`, amount);
                
                saveState();
                closePayModal();
                showToast(`Pago ${formatBRL(amount)} no débito!`);
                renderActiveTab();
            }
        }

        window.onload = function() {
            const realToday = getRealTodayString();
            simulatedTodayStr = realToday;
            localStorage.setItem('simulated_today', realToday);
            updateSimulatedToday(realToday);
        };
    </script>
</body>
</html>
