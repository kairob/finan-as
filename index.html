<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Semanal - Finanças Privadas</title>
    <!-- Biblioteca SheetJS para geração de arquivos Excel nativos diretamente no navegador -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        /* --- ESTILOS NATIVOS CSS DE ALTO DESEMPENHO (Premium Dark Theme) --- */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --border-color: #243552;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #1d4ed8;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #f43f5e;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            padding-bottom: 90px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            background-color: var(--accent-color);
            color: white;
            font-size: 20px;
            font-weight: 800;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-muted);
        }

        .header-badge {
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        /* Indicador de Segurança Local com Botão Exportar Excel */
        .sync-banner {
            background-color: #1a2333;
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sync-banner-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success-color);
        }

        .btn-excel {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-excel:hover {
            background-color: var(--success-color);
            color: white;
        }

        main {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- CARDS & METRICAS --- */
        .meta-card {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-card-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .meta-card-value {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 4px 0 8px;
        }

        .meta-card-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .margin-controller-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .margin-controller-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .margin-controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-control {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .margin-val {
            font-size: 14px;
            font-weight: 800;
            min-width: 38px;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
        }

        .summary-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 800;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 24px 0 12px;
        }

        /* --- LISTS & ITEM CARDS --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item-title {
            font-size: 15px;
            font-weight: 800;
        }

        .item-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        .item-value-side {
            text-align: right;
        }

        .item-value-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            display: block;
        }

        .item-value-main {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 99px;
            width: max-content;
        }

        .status-pill.rose { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        .status-pill.amber { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-pill.green { background: rgba(16, 185, 129, 0.15); color: #34d399; }

        .progress-bar-container {
            background-color: #1e293b;
            height: 6px;
            border-radius: 99px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        .progress-bar-fill.rose { background-color: var(--danger-color); }
        .progress-bar-fill.amber { background-color: var(--warning-color); }
        .progress-bar-fill.green { background-color: var(--success-color); }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #cbd5e1; }

        /* --- CONTROLES DE AÇÕES DOS CARTÕES --- */
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 4px;
        }

        .action-buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-action {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            color: white;
            min-width: 0;
            flex: 1;
        }

        .btn-action.pay {
            background-color: var(--accent-color);
        }

        .btn-action.pay:hover {
            background-color: var(--accent-hover);
        }

        .btn-action.edit {
            background-color: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            border: 1px solid var(--border-color);
        }

        .btn-action.edit:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-action.delete {
            background-color: rgba(244, 63, 94, 0.12);
            color: #f43f5e;
            border: 1px solid rgba(244, 63, 94, 0.2);
            grid-column: span 2;
        }

        .btn-action.delete:hover {
            background-color: var(--danger-color);
            color: white;
        }

        /* --- NAV BAR --- */
        nav {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            height: 72px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 12px;
            z-index: 99;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 72px;
            height: 52px;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 2.2;
        }

        .nav-btn.active {
            color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.08);
        }

        .btn-fab {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            margin-top: -24px;
            transition: transform 0.2s ease;
        }

        .btn-fab:active {
            transform: scale(0.9);
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 800;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .form-input {
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 14px;
            font-family: var(--font-family);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: #0b0f19;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .form-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .form-tab-btn.active {
            background-color: var(--card-bg);
            color: white;
            border: 1px solid var(--border-color);
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 84px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            z-index: 2000;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* --- DIARIO DE EVENTOS --- */
        .log-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .log-tag.criacao { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .log-tag.edicao { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .log-tag.remocao { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        .log-tag.adiantamento { background: rgba(16, 185, 129, 0.15); color: #34d399; }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <div class="header-logo">$</div>
            <div>
                <h1 class="header-title">Meta Semanal</h1>
                <p class="header-subtitle">Planejamento Exato por Data</p>
            </div>
        </div>
        <div class="header-badge" id="current-badge-date">Mês Corrente</div>
    </header>

    <!-- Indicador de Segurança Local com Botão Exportar Excel -->
    <div id="sync-status-banner" class="sync-banner">
        <div class="sync-banner-text">
            <span class="sync-dot"></span>
            <span>Armazenamento Local Ativo (Offline)</span>
        </div>
        <button class="btn-excel" onclick="exportToExcel()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
            Excel
        </button>
    </div>

    <main id="main-content">
        <!-- Injetado Dinamicamente -->
    </main>

    <nav>
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
            Metas
        </button>
        <button onclick="switchTab('cartoes')" id="nav-cartoes" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" /></svg>
            Faturas
        </button>
        <button onclick="openAddModal()" class="btn-fab" aria-label="Adicionar Novo">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
        <button onclick="switchTab('partilhas')" id="nav-partilhas" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
            Partilhas
        </button>
        <button onclick="switchTab('diario')" id="nav-diario" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>
            Diário
        </button>
    </nav>

    <!-- MODAL -->
    <div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Novo Registro</h3>
                <button onclick="closeAddModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="form-tabs" id="modal-tabs-container">
                <button onclick="switchModalFormTab('card')" id="modal-tab-card" class="form-tab-btn active">Cartão/Despesa</button>
                <button onclick="switchModalFormTab('loan')" id="modal-tab-loan" class="form-tab-btn">Partilha</button>
            </div>
            <form id="modal-form" onsubmit="saveRecord(event)">
                <div id="form-fields"></div>
                <button type="submit" class="btn-submit">Confirmar Salvar</button>
            </form>
        </div>
    </div>

    <!-- MODAL DE ADIANTAMENTO RÁPIDO (DÉBITO) -->
    <div id="pay-modal" class="modal-overlay" onclick="handlePayOverlayClick(event)">
        <div class="modal-container" style="border-radius: 24px; padding: 24px;">
            <div class="modal-header">
                <h3 class="modal-title">Registrar Adiantamento (Débito/Pix)</h3>
                <button onclick="closePayModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form onsubmit="submitPayment(event)">
                <input type="hidden" id="pay-card-id">
                <div class="form-group">
                    <label class="form-label" id="pay-card-label">Adiantar Cartão: -</label>
                    <input type="number" step="0.01" min="0.01" required id="pay-amount" class="form-input" placeholder="Valor do Adiantamento (R$)">
                </div>
                <button type="submit" class="btn-submit">Registrar Pagamento</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toast-msg">Salvo!</span></div>

    <!-- SCRIPT FINANÇAS LOCAIS -->
    <script>
        // 🛡️ DADOS INICIAIS VAZIOS (Para privacidade por omissão no seu GitHub público)
        const initialCards = [];
        const initialLoans = [];
        const initialHistory = [
            { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Sistema de Livro Diário inicializado com sucesso.', amount: 0 }
        ];

        // Estado carregado diretamente do armazenamento local (localStorage)
        let state = {
            cards: JSON.parse(localStorage.getItem('cards')) || initialCards,
            loans: JSON.parse(localStorage.getItem('loans')) || initialLoans,
            history: JSON.parse(localStorage.getItem('history')) || initialHistory,
            safetyMargin: parseFloat(localStorage.getItem('safetyMargin')) || 0.15,
            activeTab: 'dashboard',
            modalMode: 'create', // 'create' ou 'edit'
            modalFormTab: 'card', // 'card' ou 'loan'
            editingId: null
        };

        // Salvar estado localmente
        function saveState() {
            localStorage.setItem('cards', JSON.stringify(state.cards));
            localStorage.setItem('loans', JSON.stringify(state.loans));
            localStorage.setItem('history', JSON.stringify(state.history));
            localStorage.setItem('safetyMargin', state.safetyMargin.toString());
        }

        // Exibir feedbacks rápidos
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Formatação de valores Monetários BRL
        function formatBRL(v) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        // Função para acrescentar entradas no Livro Diário de forma cronológica
        function logToJournal(type, description, amount) {
            const timestamp = new Date().toLocaleString('pt-BR');
            state.history.unshift({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                date: timestamp,
                type: type,
                description: description,
                amount: amount
            });
            // Mantém no máximo 500 registros para otimização de performance
            if (state.history.length > 500) {
                state.history = state.history.slice(0, 500);
            }
        }

        // Sistema Simulado de Data Base (Data do Dia)
        let simulatedTodayStr = new Date().toISOString().split('T')[0];
        
        function getRealTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function updateSimulatedToday(dateStr) {
            simulatedTodayStr = dateStr;
            localStorage.setItem('simulated_today', dateStr);
            
            const [year, month, day] = dateStr.split('-');
            const dateObj = new Date(year, month - 1, day);
            const opt = { month: 'long', year: 'numeric' };
            const label = dateObj.toLocaleDateString('pt-BR', opt);
            
            document.getElementById('current-badge-date').textContent = label.toUpperCase();
            renderActiveTab();
        }

        // --- SISTEMA DE CÁLCULO E MOTOR FINANCEIRO DA META ---
        function calculateWeeklyMetas() {
            const [todayYear, todayMonth, todayDay] = simulatedTodayStr.split('-').map(Number);
            const today = new Date(todayYear, todayMonth - 1, todayDay);
            const currentYear = today.getFullYear();
            const currentMonth = today.getMonth();

            let totalBaseBill = 0;
            let totalPrepaid = 0;
            let totalLoansSum = 0;
            let totalMyShare = 0;

            const processedCards = state.cards.map(card => {
                const dueDay = parseInt(card.dueDay);
                let computedDueDate = new Date(currentYear, currentMonth, dueDay);

                // Tratamento se o vencimento for para o mês subsequente
                if (computedDueDate < today) {
                    computedDueDate = new Date(currentYear, currentMonth + 1, dueDay);
                }

                const diffTime = computedDueDate.getTime() - today.getTime();
                const daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // Processar partilhas de devedores associadas ao nome deste cartão
                const loansForCard = state.loans.filter(l => l.name.trim().toLowerCase() === card.name.trim().toLowerCase());
                let loansTotal = 0;
                loansForCard.forEach(l => {
                    loansTotal += (parseFloat(l.MP || 0) + parseFloat(l.PP || 0) + parseFloat(l.SAN || 0) + parseFloat(l.NIO || 0));
                });

                const totalBill = parseFloat(card.totalBill || 0);
                const prepaidAmount = parseFloat(card.prepaid || 0);
                
                // Cálculo de minha parte líquida: Total Fatura - Parcelas Devedores - Adiantamentos pagos
                const myShare = Math.max(0, totalBill - loansTotal - prepaidAmount);

                // Cálculo de esforço semanal (Até o vencimento da fatura)
                const weeksRemaining = Math.max(1, daysRemaining / 7);
                const weeklyEffort = myShare / weeksRemaining;

                totalBaseBill += totalBill;
                totalPrepaid += prepaidAmount;
                totalLoansSum += loansTotal;
                totalMyShare += myShare;

                return {
                    ...card,
                    computedDueDate,
                    daysRemaining,
                    loansTotal,
                    prepaidAmount,
                    myShare,
                    weeklyEffort,
                    weeksRemaining
                };
            });

            // Somatório de todas as Metas Semanais líquidas
            const baseWeeklyMeta = processedCards.reduce((sum, item) => sum + item.weeklyEffort, 0);
            const totalWeeklyMeta = baseWeeklyMeta * (1 + state.safetyMargin);

            return {
                processedCards,
                totalBaseBill,
                totalPrepaid,
                totalLoansSum,
                totalMyShare,
                baseWeeklyMeta,
                totalWeeklyMeta
            };
        }

        // --- SISTEMA DE ABAS ---
        window.switchTab = function(tabName) {
            state.activeTab = tabName;
            
            // Atualiza classe ativa dos botões do menu inferior
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            const activeNavBtn = document.getElementById(`nav-${tabName}`);
            if (activeNavBtn) activeNavBtn.classList.add('active');

            renderActiveTab();
        }

        function renderActiveTab() {
            const container = document.getElementById('main-content');
            const data = calculateWeeklyMetas();

            if (state.activeTab === 'dashboard') {
                renderDashboard(container, data);
            } else if (state.activeTab === 'cartoes') {
                renderCartoes(container, data);
            } else if (state.activeTab === 'partilhas') {
                renderPartilhas(container);
            } else if (state.activeTab === 'diario') {
                renderDiario(container);
            }
        }

        // Ajustar dinamicamente a margem de segurança
        window.adjustMargin = function(amount) {
            state.safetyMargin = Math.max(0, state.safetyMargin + amount);
            saveState();
            renderActiveTab();
        };

                <div class="summary-grid" style="grid-template-columns: 1fr 1fr 1fr; font-size: 11px;">

                    </div>
                    <div class="summary-card" style="padding: 10px;">
                        <span class="summary-label" style="font-size: 9px;">Devedores (Partilha)</span>
                        <span class="summary-value" style="font-size: 13px; color: var(--warning-color);">${formatBRL(data.totalLoansSum)}</span>

                <h3 class="section-title">Esforço Semanal Requerido</h3>

                ` : data.processedCards.map(c => {
                    let color = c.daysRemaining < 0 ? 'rose' : (c.daysRemaining <= 7 ? 'amber' : 'green');
                    let displayDays = c.daysRemaining < 0 ? 'Atrasado' : `em ${c.daysRemaining} dias`;
                    let progress = Math.min(100, Math.max(0, ((c.prepaidAmount + c.loansTotal) / (c.totalBill || 1)) * 100));

                    return `
                        <div class="item-card">
                            <div class="item-card-header">
                                <div>
                                    <h4 class="item-title">${c.name}</h4>
                                    <span class="item-subtitle">Vencimento: Dia ${c.dueDay} (${displayDays})</span>
                                </div>
                                <span class="status-pill ${color}">Meta Semanal: ${formatBRL(c.weeklyEffort)}</span>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: -4px;">
                                <span>Progresso da Quitação (Adiantamentos + Partilhas)</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill ${color}" style="width: ${progress}%"></div>
                            </div>

                            <div class="info-row">
                                <span>Fatura Base: ${formatBRL(c.totalBill)}</span>
                                <span>Minha Parte: ${formatBRL(c.myShare)}</span>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        function renderCartoes(container, data) {
            container.innerHTML = `

                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px;">

                showToast("Diário limpo!");

        // --- EXPORTAÇÃO EXCEL NATIVA EM 3 ABAS COM FORMATO xlsx ---
        window.exportToExcel = function() {
            try {
                const calcs = calculateWeeklyMetas();
                const wb = XLSX.utils.book_new();

                // 1. Criar dados para a primeira aba: "Resumo & Cartões"
                const summaryHeader = [
                    ["GESTOR FINANCEIRO - METAS SEMANAIS"],
                    ["Data da Exportação", new Date().toLocaleDateString('pt-BR')],
                    [],
                    ["MÉTRICAS GERAIS"],
                    ["Minha Meta Semanal (Com Margem)", calcs.totalWeeklyMeta],
                    ["Meta Semanal Base (Sem Margem)", calcs.baseWeeklyMeta],
                    ["Margem de Segurança Aplicada", `${Math.round(state.safetyMargin * 100)}%`],
                    ["Minha Parte Líquida Total (Mês)", calcs.totalMyShare],
                    ["Total Bruto Faturas Cadastradas", calcs.totalBaseBill],
                    ["Total de Dívidas de Partilha", calcs.totalLoansSum],
                    ["Total de Pagamentos Adiantados", calcs.totalPrepaid],
                    [],
                    ["CONTROLE DE FATURAS E CARTÕES"],
                    ["Nome do Cartão", "Valor Total (R$)", "Dia Vencimento", "Próximo Vencimento", "Dívida Devedores (R$)", "Adiantamento Pago (R$)", "Minha Parte Líquida (R$)", "Esforço Semanal Requerido (R$)", "Dias Restantes"]
                ];

                calcs.processedCards.forEach(c => {
                    summaryHeader.push([
                        c.name,
                        c.totalBill,
                        c.dueDay,
                        c.computedDueDate.toLocaleDateString('pt-BR'),
                        c.loansTotal,
                        c.prepaidAmount,
                        c.myShare,
                        c.weeklyEffort,
                        c.daysRemaining
                    ]);
                });

                const wsSummary = XLSX.utils.aoa_to_sheet(summaryHeader);
                XLSX.utils.book_append_sheet(wb, wsSummary, "Resumo e Cartões");

                // 2. Criar dados para a segunda aba: "Partilhas & Devedores"
                const loansHeader = [
                    ["DETALHAMENTO DE DEVEDORES POR CARTÃO VINCULADO"],
                    [],
                    ["Nome do Grupo/Cartão", "Devedor MP (R$)", "Devedor PP (R$)", "Devedor SAN (R$)", "Devedor NIO (R$)", "Total Devedores do Grupo (R$)"]
                ];

                state.loans.forEach(l => {
                    const total = parseFloat(l.MP || 0) + parseFloat(l.PP || 0) + parseFloat(l.SAN || 0) + parseFloat(l.NIO || 0);
                    loansHeader.push([
                        l.name,
                        parseFloat(l.MP || 0),
                        parseFloat(l.PP || 0),
                        parseFloat(l.SAN || 0),
                        parseFloat(l.NIO || 0),
                        total
                    ]);
                });

                const wsLoans = XLSX.utils.aoa_to_sheet(loansHeader);
                XLSX.utils.book_append_sheet(wb, wsLoans, "Partilhas e Devedores");

                // 3. Criar dados para a terceira aba: "Livro Diário"
                const journalHeader = [
                    ["LIVRO DIÁRIO - REGISTRO DE TRANSAÇÕES"],
                    ["Arquivo auditado cronologicamente"],
                    [],
                    ["Data/Hora", "Tipo de Ação", "Descrição do Evento", "Valor Associado (R$)"]
                ];

                state.history.forEach(h => {
                    journalHeader.push([
                        h.date,
                        h.type,
                        h.description,
                        h.amount
                    ]);
                });

                const wsJournal = XLSX.utils.aoa_to_sheet(journalHeader);
                XLSX.utils.book_append_sheet(wb, wsJournal, "Livro Diário");

                // Configuração da data no formato dd_mm_aaaa para o nome do arquivo
                const d = new Date();
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = d.getFullYear();
                const formattedDate = `${day}_${month}_${year}`;

                // Gerar e descarregar o arquivo .xlsx completo com a nova formatação de data
                XLSX.writeFile(wb, `Gestor_Financas_Completo_${formattedDate}.xlsx`);
                showToast("Arquivo Excel (3 abas) exportado com sucesso!");
            } catch (err) {
                console.error("Erro na exportação Excel:", err);
                showToast("Erro ao gerar o arquivo Excel.");
            }
        }

                    <div class="form-group">
                        <label class="form-label">Nome exato do Cartão Relacionado</label>
                        <input type="text" required id="f-loan-name" class="form-input" placeholder="Nome idêntico ao cartão: Ex: Visa Inter" value="${editData ? editData.name : ''}">
                    </div>
                    <div class="form-group" style="border-top: 1px dashed var(--border-color); padding-top: 12px; margin-top: 12px;">
                        <span class="form-label" style="font-weight: 800; color: white;">VALORES INDIVIDUAIS DOS CO-RESPONSÁVEIS:</span>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fração MP (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-mp" class="form-input" value="${editData ? editData.MP : '0'}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fração PP (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-pp" class="form-input" value="${editData ? editData.PP : '0'}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fração SAN (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-san" class="form-input" value="${editData ? editData.SAN : '0'}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Fração NIO (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-nio" class="form-input" value="${editData ? editData.NIO : '0'}">
                    </div>
                `;
            }
        }

        window.saveRecord = function(e) {
            e.preventDefault();

            if (state.modalFormTab === 'card') {
                const name = document.getElementById('f-card-name').value.trim();
                const totalBill = parseFloat(document.getElementById('f-card-bill').value) || 0;
                const dueDay = parseInt(document.getElementById('f-card-day').value);
                const prepaid = parseFloat(document.getElementById('f-card-prepaid').value) || 0;

                if (state.modalMode === 'edit') {
                    const idx = state.cards.findIndex(i => i.id === state.editingId);
                    if (idx !== -1) {
                        state.cards[idx] = { ...state.cards[idx], name, totalBill, dueDay, prepaid };
                        logToJournal('edicao', `Edição de cartão: ${name}. Fatura: ${formatBRL(totalBill)}.`, totalBill);
                    }
                } else {
                    state.cards.push({ id: Date.now().toString(), name, totalBill, dueDay, prepaid });
                    logToJournal('criacao', `Criação do cartão/despesa ${name} com vencimento no dia ${dueDay}.`, totalBill);
                    if (prepaid > 0) {
                        logToJournal('adiantamento', `Adiantamento registrado na criação do cartão ${name}.`, prepaid);
                    }
                }
                switchTab('cartoes');
            } else {
                const name = document.getElementById('f-loan-name').value.trim();
                const MP = parseFloat(document.getElementById('f-loan-mp').value) || 0;
                const PP = parseFloat(document.getElementById('f-loan-pp').value) || 0;
                const SAN = parseFloat(document.getElementById('f-loan-san').value) || 0;
                const NIO = parseFloat(document.getElementById('f-loan-nio').value) || 0;
                const sum = MP + PP + SAN + NIO;

                if (state.modalMode === 'edit') {
                    const idx = state.loans.findIndex(i => i.id === state.editingId);
                    if (idx !== -1) {
                        state.loans[idx] = { ...state.loans[idx], name, MP, PP, SAN, NIO };
                        logToJournal('edicao', `Atualização da partilha de ${name}. Total devedor: ${formatBRL(sum)}.`, sum);
                    }
                } else {
                    state.loans.push({ id: Date.now().toString(), name, MP, PP, SAN, NIO });
                    logToJournal('criacao', `Nova partilha registrada para ${name}. Valor em dívida: ${formatBRL(sum)}.`, sum);
                }
                switchTab('partilhas');
            }
            saveState();
            closeAddModal();
            showToast('Salvo com sucesso!');
        }

        window.editCard = function(id) {
            const cardObj = state.cards.find(i => i.id === id);
            if (!cardObj) return;

            state.modalMode = 'edit';
            state.editingId = id;
            state.modalFormTab = 'card';
            
            document.getElementById('modal-title').textContent = `Editar Cartão ${cardObj.name}`;
            document.getElementById('modal-tabs-container').style.display = 'none'; // Esconder abas durante a edição
            
            document.getElementById('modal').classList.add('open');
            renderFormFields(cardObj);
        }

        window.deleteCard = function(id) {
            const cardObj = state.cards.find(i => i.id === id);
            if (cardObj && confirm(`Deseja excluir permanentemente o cartão ${cardObj.name}?`)) {
                logToJournal('remocao', `Remoção do cartão/despesa: ${cardObj.name}. Fatura: ${formatBRL(cardObj.totalBill)}.`, -cardObj.totalBill);
                state.cards = state.cards.filter(i => i.id !== id);
                saveState();
                renderActiveTab();
            }
        }

        window.editLoan = function(id) {
            const loanObj = state.loans.find(i => i.id === id);
            if (!loanObj) return;

            state.modalMode = 'edit';
            state.editingId = id;
            state.modalFormTab = 'loan';

            document.getElementById('modal-title').textContent = `Editar Partilha ${loanObj.name}`;
            document.getElementById('modal-tabs-container').style.display = 'none';

            document.getElementById('modal').classList.add('open');
            renderFormFields(loanObj);
        }

        window.deleteLoan = function(id) {
            const loanObj = state.loans.find(i => i.id === id);
            if (loanObj && confirm(`Remover devedor ${loanObj.name}?`)) {
                const total = parseFloat(loanObj.MP || 0) + parseFloat(loanObj.PP || 0) + parseFloat(loanObj.SAN || 0) + parseFloat(loanObj.NIO || 0);
                logToJournal('remocao', `Remoção do registro de devedor: ${loanObj.name}.`, -total);
                state.loans = state.loans.filter(i => i.id !== id);
                saveState();
                renderActiveTab();
            }
        }

        // --- SISTEMA DE MODAL DE ADIANTAMENTO RÁPIDO (DÉBITO/PIX) ---
        window.openPayModal = function(id, name) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            document.getElementById('pay-card-id').value = id;
            document.getElementById('pay-card-label').textContent = `Adiantar Cartão: ${name} (Fatura Atual: ${formatBRL(c.totalBill)})`;
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-modal').classList.add('open');
        }

        window.closePayModal = function() {
            document.getElementById('pay-modal').classList.remove('open');
        }

        window.handlePayOverlayClick = function(e) {
            if (e.target.id === 'pay-modal') closePayModal();
        }

        window.submitPayment = function(e) {
            e.preventDefault();
            const id = document.getElementById('pay-card-id').value;
            const amount = parseFloat(document.getElementById('pay-amount').value) || 0;

            const idx = state.cards.findIndex(c => c.id === id);
            if (idx !== -1) {
                const currentPrepaid = parseFloat(state.cards[idx].prepaid || 0);
                state.cards[idx].prepaid = currentPrepaid + amount;

                // Grava a transação no diário
                logToJournal('adiantamento', `Adiantamento via Débito/Pix efetuado no cartão ${state.cards[idx].name}.`, amount);

                saveState();
                closePayModal();
                showToast(`Pago ${formatBRL(amount)} no débito!`);
                renderActiveTab();
            }
        }

        window.onload = function() {
            const realToday = getRealTodayString();
            simulatedTodayStr = realToday;
            localStorage.setItem('simulated_today', realToday);
            updateSimulatedToday(realToday);
        };
    </script>
</body>
</html>
