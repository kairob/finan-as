<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Semanal - Finanças Privadas</title>
    <!-- Biblioteca SheetJS para geração de arquivos Excel nativos diretamente no navegador -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        /* --- ESTILOS NATIVOS CSS DE ALTO DESEMPENHO (Premium Dark Theme) --- */
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151f32;
            --border-color: #243552;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #3b82f6;
            --accent-hover: #1d4ed8;
            --success-color: #10b981; 
            --warning-color: #f59e0b;
            --danger-color: #f43f5e;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            padding-bottom: 95px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: var(--card-bg);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            background-color: var(--accent-color);
            color: white;
            font-size: 20px;
            font-weight: 800;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 11px;
            color: var(--text-muted);
        }

        .header-badge {
            background-color: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 12px;
            border-radius: 99px;
            border: 1px solid rgba(59, 130, 246, 0.25);
        }

        /* Indicador de Segurança Local com Botão Exportar Excel */
        .sync-banner {
            background-color: #1a2333;
            border-bottom: 1px solid var(--border-color);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sync-banner-text {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--success-color);
        }

        .btn-excel {
            background-color: rgba(16, 185, 129, 0.15);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        .btn-excel:hover {
            background-color: var(--success-color);
            color: white;
        }

        main {
            flex: 1;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        /* --- CARDS & METRICAS --- */
        .meta-card {
            background: linear-gradient(135deg, #1d4ed8 0%, #1e3a8a 100%);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .meta-card-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .meta-card-value {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 4px 0 8px;
        }

        .meta-card-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.6);
        }

        .margin-controller-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .margin-controller-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .margin-controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-control {
            background-color: #1e293b;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .margin-val {
            font-size: 14px;
            font-weight: 800;
            min-width: 38px;
            text-align: center;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
        }

        .summary-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .summary-value {
            font-size: 18px;
            font-weight: 800;
        }

        .section-title {
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin: 24px 0 12px;
        }

        /* --- LISTS & ITEM CARDS --- */
        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .item-title {
            font-size: 15px;
            font-weight: 800;
        }

        .item-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        .item-value-side {
            text-align: right;
        }

        .item-value-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            display: block;
        }

        .item-value-main {
            font-size: 15px;
            font-weight: 800;
            color: var(--text-main);
        }

        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 99px;
            width: max-content;
        }

        .status-pill.rose { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        .status-pill.amber { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .status-pill.green { background: rgba(16, 185, 129, 0.15); color: #34d399; }

        .progress-bar-container {
            background-color: #1e293b;
            height: 6px;
            border-radius: 99px;
            overflow: hidden;
            width: 100%;
        }

        .progress-bar-fill {
            height: 100%;
            border-radius: 99px;
            transition: width 0.3s ease;
        }

        .progress-bar-fill.rose { background-color: var(--danger-color); }
        .progress-bar-fill.amber { background-color: var(--warning-color); }
        .progress-bar-fill.green { background-color: var(--success-color); }

        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }

        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #cbd5e1; }

        /* --- CONTROLES DE AÇÕES DOS CARTÕES --- */
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-top: 1px solid var(--border-color);
            padding-top: 12px;
            margin-top: 4px;
        }

        .action-buttons-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-action {
            border: none;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            color: white;
            min-width: 0;
            flex: 1;
        }

        .btn-action.pay {
            background-color: var(--accent-color);
        }

        .btn-action.pay:hover {
            background-color: var(--accent-hover);
        }

        .btn-action.edit {
            background-color: rgba(255, 255, 255, 0.08);
            color: #cbd5e1;
            border: 1px solid var(--border-color);
        }

        .btn-action.edit:hover {
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn-action.delete {
            background-color: rgba(244, 63, 94, 0.12);
            color: #f43f5e;
            border: 1px solid rgba(244, 63, 94, 0.2);
            grid-column: span 2;
        }

        .btn-action.delete:hover {
            background-color: var(--danger-color);
            color: white;
        }

        /* --- NAV BAR --- */
        nav {
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            height: 76px;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 8px;
            z-index: 99;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            width: 60px;
            height: 54px;
            justify-content: center;
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .nav-btn svg {
            width: 18px;
            height: 18px;
            stroke-width: 2.2;
        }

        .nav-btn.active {
            color: var(--accent-color);
            background-color: rgba(59, 130, 246, 0.08);
        }

        .btn-fab {
            background-color: var(--accent-color);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            margin-top: -24px;
            transition: transform 0.2s ease;
        }

        .btn-fab:active {
            transform: scale(0.9);
        }

        /* --- MODAIS --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 16px;
            font-weight: 800;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 6px;
            display: block;
        }

        .form-input {
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: white;
            padding: 12px;
            width: 100%;
            font-size: 14px;
            font-family: var(--font-family);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: #0b0f19;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 16px;
        }

        .form-tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .form-tab-btn.active {
            background-color: var(--card-bg);
            color: white;
            border: 1px solid var(--border-color);
        }

        .btn-submit {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            width: 100%;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- TOAST --- */
        .toast {
            position: fixed;
            bottom: 88px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 99px;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            z-index: 2000;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* --- DIÁRIO --- */
        .log-tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .log-tag.criacao { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
        .log-tag.edicao { background: rgba(245, 158, 11, 0.15); color: #fbbf24; }
        .log-tag.remocao { background: rgba(244, 63, 94, 0.15); color: #fb7185; }
        .log-tag.adiantamento { background: rgba(16, 185, 129, 0.15); color: #34d399; }
        .log-tag.salario { background: rgba(167, 139, 250, 0.15); color: #c084fc; }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <div class="header-logo">$</div>
            <div>
                <h1 class="header-title">Meta Semanal</h1>
                <p class="header-subtitle">Planejamento Exato por Data</p>
            </div>
        </div>
        <div class="header-badge" id="current-badge-date">Mês Corrente</div>
    </header>

    <div id="sync-status-banner" class="sync-banner">
        <div class="sync-banner-text">
            <span class="sync-dot"></span>
            <span>Armazenamento Local Ativo (Offline)</span>
        </div>
        <button class="btn-excel" onclick="exportToExcel()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
            Excel
        </button>
    </div>

    <main id="main-content">
        <!-- Injetado Dinamicamente -->
    </main>

    <nav>
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" /></svg>
            Metas
        </button>
        <button onclick="switchTab('cartoes')" id="nav-cartoes" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z" /></svg>
            Faturas
        </button>
        <button onclick="openAddModal()" class="btn-fab" aria-label="Adicionar Novo">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
        <button onclick="switchTab('partilhas')" id="nav-partilhas" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 003.741-.479 3 3 0 00-4.682-2.72m.94 3.198l.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0112 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 016 18.719m12 0a5.971 5.971 0 00-.941-3.197m0 0A5.995 5.995 0 0012 12.75a5.995 5.995 0 00-5.058 2.772m0 0a3 3 0 00-4.681 2.72 8.986 8.986 0 003.74.477m.94-3.197a5.971 5.971 0 00-.94 3.197M15 6.75a3 3 0 11-6 0 3 3 0 016 0zm6 3a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0zm-13.5 0a2.25 2.25 0 11-4.5 0 2.25 2.25 0 014.5 0z" /></svg>
            Partilhas
        </button>
        <button onclick="switchTab('salario')" id="nav-salario" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V18.75M3.75 4.5h16.5c.621 0 1.125.504 1.125 1.125v12c0 .621-.504 1.125-1.125 1.125H3.75a1.125 1.125 0 0 1-1.125-1.125V5.625c0-.621.504-1.125 1.125-1.125Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M12 9.75v3.5m-3-1.75h6" /></svg>
            Salário
        </button>
        <button onclick="switchTab('diario')" id="nav-diario" class="nav-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 006 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 016 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 016-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0018 18a8.967 8.967 0 00-6 2.292m0-14.25v14.25" /></svg>
            Diário
        </button>
    </nav>

    <!-- MODAL -->
    <div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Novo Registro</h3>
                <button onclick="closeAddModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="form-tabs" id="modal-tabs-container">
                <button onclick="switchModalFormTab('card')" id="modal-tab-card" class="form-tab-btn active">Cartão/Despesa</button>
                <button onclick="switchModalFormTab('loan')" id="modal-tab-loan" class="form-tab-btn">Partilha</button>
            </div>
            <form id="modal-form" onsubmit="saveRecord(event)">
                <div id="form-fields"></div>
                <button type="submit" class="btn-submit">Confirmar Salvar</button>
            </form>
        </div>
    </div>

    <!-- MODAL DE ADIANTAMENTO RÁPIDO -->
    <div id="pay-modal" class="modal-overlay" onclick="handlePayOverlayClick(event)">
        <div class="modal-container" style="border-radius: 24px; padding: 24px;">
            <div class="modal-header">
                <h3 class="modal-title">Registrar Adiantamento (Débito/Pix)</h3>
                <button onclick="closePayModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form onsubmit="submitPayment(event)">
                <input type="hidden" id="pay-card-id">
                <div class="form-group">
                    <label class="form-label" id="pay-card-label">Adiantar Cartão: -</label>
                    <input type="number" step="0.01" min="0.01" required id="pay-amount" class="form-input" placeholder="Valor do Adiantamento (R$)">
                </div>
                <button type="submit" class="btn-submit">Registrar Pagamento</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast" onclick="hideToast()"><span id="toast-msg">Salvo!</span></div>

    <script>
        const initialCards = [];
        const initialLoans = [];
        const initialHistory = [
            { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Sistema de Livro Diário inicializado com sucesso.', amount: 0 }
        ];

        let state = {
            cards: JSON.parse(localStorage.getItem('cards')) || initialCards,
            loans: JSON.parse(localStorage.getItem('loans')) || initialLoans,
            history: JSON.parse(localStorage.getItem('history')) || initialHistory,
            safetyMargin: parseFloat(localStorage.getItem('safetyMargin')) || 0.15,
            
            salaryValue: parseFloat(localStorage.getItem('salaryValue')) || 0,
            salaryDay: parseInt(localStorage.getItem('salaryDay')) || 1,

            activeTab: 'dashboard',
            modalMode: 'create',
            modalFormTab: 'card',
            editingId: null
        };

        function saveState() {
            localStorage.setItem('cards', JSON.stringify(state.cards));
            localStorage.setItem('loans', JSON.stringify(state.loans));
            localStorage.setItem('history', JSON.stringify(state.history));
            localStorage.setItem('safetyMargin', state.safetyMargin.toString());
            
            localStorage.setItem('salaryValue', state.salaryValue.toString());
            localStorage.setItem('salaryDay', state.salaryDay.toString());
        }

        // Variável global para gerenciar com segurança o tempo de exibição do toast
        let toastTimeout = null;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            
            if (toast && toastMsg) {
                // Cancela qualquer timeout pendente para evitar bugs de transição
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                }
                
                toastMsg.textContent = msg;
                toast.classList.add('show');
                
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                    toastTimeout = null;
                }, 2500);
            }
        }

        function hideToast() {
            const toast = document.getElementById('toast');
            if (toast) {
                toast.classList.remove('show');
                if (toastTimeout) {
                    clearTimeout(toastTimeout);
                    toastTimeout = null;
                }
            }
        }

        function formatBRL(v) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        function logToJournal(type, description, amount) {
            const timestamp = new Date().toLocaleString('pt-BR');
            state.history.unshift({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                date: timestamp,
                type: type,
                description: description,
                amount: amount
            });
            if (state.history.length > 500) {
                state.history = state.history.slice(0, 500);
            }
        }

        let simulatedTodayStr = new Date().toISOString().split('T')[0];
        
        function getRealTodayString() {
            return new Date().toISOString().split('T')[0];
        }

        function updateSimulatedToday(dateStr) {
            simulatedTodayStr = dateStr;
            localStorage.setItem('simulated_today', dateStr);
            
            const [year, month, day] = dateStr.split('-');
            const dateObj = new Date(year, month - 1, day);
            const opt = { month: 'long', year: 'numeric' };
            const label = dateObj.toLocaleDateString('pt-BR', opt);
            
            document.getElementById('current-badge-date').textContent = label.toUpperCase();
            renderActiveTab();
        }

        // --- SISTEMA CORRIGIDO DE CÁLCULO ESTREITO DE COPARTICIPAÇÃO ---
        function normalizeString(str) {
            if (!str) return '';
            return str.trim()
                      .toLowerCase()
                      .normalize("NFD")
                      .replace(/[\u0300-\u036f]/g, "") // Remove acentos
                      .replace(/\s+/g, '');            // Remove espaços
        }

        function getSpecificCardLoanValue(loan, cardName) {
            if (!loan || !cardName) return 0;
            const normCard = normalizeString(cardName);
            
            if (normCard.includes('santander')) {
                return parseFloat(loan.Santander || 0);
            } else if (normCard.includes('nio') || normCard.includes('nubank')) {
                return parseFloat(loan.Nio || 0);
            } else if (normCard.includes('mercado') || normCard.includes('pago')) {
                return parseFloat(loan.MercadoPago || 0);
            } else if (normCard.includes('picpay') || normCard.includes('pic')) {
                return parseFloat(loan.PicPay || 0);
            }
            return 0;
        }

        function getLoanTotal(l) {
            if (!l) return 0;
            return parseFloat(l.Santander || 0) + 
                   parseFloat(l.Nio || 0) + 
                   parseFloat(l.MercadoPago || 0) + 
                   parseFloat(l.PicPay || 0);
        }

        function getDaysUntilPayday() {
            const [todayYear, todayMonth, todayDay] = simulatedTodayStr.split('-').map(Number);
            const today = new Date(todayYear, todayMonth - 1, todayDay);
            
            let payday = new Date(today.getFullYear(), today.getMonth(), state.salaryDay);
            if (today.getDate() >= state.salaryDay) {
                payday = new Date(today.getFullYear(), today.getMonth() + 1, state.salaryDay);
            }
            const diffTime = payday.getTime() - today.getTime();
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        // --- MOTOR FINANCEIRO ADAPTADO COM ENTRADA DE DATA EXATA ---
        function calculateWeeklyMetas() {
            const [todayYear, todayMonth, todayDay] = simulatedTodayStr.split('-').map(Number);
            const today = new Date(todayYear, todayMonth - 1, todayDay);

            let totalBaseBill = 0;
            let totalPrepaid = 0;
            let totalLoansSum = 0;
            let totalMyShare = 0;

            const processedCards = state.cards.map(card => {
                // card.dueDate está gravado no formato nativo 'YYYY-MM-DD'
                const [cardYear, cardMonth, cardDay] = card.dueDate.split('-').map(Number);
                let computedDueDate = new Date(cardYear, cardMonth - 1, cardDay);

                // Lógica de cálculo do tempo restante corrente
                let diffTime = computedDueDate.getTime() - today.getTime();
                let daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // Se a data de vencimento escolhida já passou de forma corrente,
                // rolamos automaticamente para o mesmo dia no mês subsequente
                if (daysRemaining < 0) {
                    while (daysRemaining < 0) {
                        computedDueDate.setMonth(computedDueDate.getMonth() + 1);
                        diffTime = computedDueDate.getTime() - today.getTime();
                        daysRemaining = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                    }
                }

                // Soma a fração específica deste cartão de TODAS as partilhas cadastradas, garantindo o abatimento correto
                let loansTotal = 0;
                state.loans.forEach(l => {
                    loansTotal += getSpecificCardLoanValue(l, card.name);
                });

                const totalBill = parseFloat(card.totalBill || 0);
                const prepaidAmount = parseFloat(card.prepaid || 0);
                
                // CÁLCULO DO SALDO DEVEDOR REAL DO USUÁRIO
                const myShare = Math.max(0, totalBill - loansTotal - prepaidAmount);
                const weeksRemaining = Math.max(1, daysRemaining / 7);
                
                // ESFORÇO SEMANAL BASEADO NA DATA DE VENCIMENTO DO CARTÃO
                const weeklyEffort = myShare / weeksRemaining;

                totalBaseBill += totalBill;
                totalPrepaid += prepaidAmount;
                totalLoansSum += loansTotal;
                totalMyShare += myShare;

                return {
                    ...card,
                    computedDueDate,
                    daysRemaining,
                    loansTotal,
                    prepaidAmount,
                    myShare,
                    weeklyEffort,
                    weeksRemaining
                };
            });

            const baseWeeklyMeta = processedCards.reduce((sum, item) => sum + item.weeklyEffort, 0);
            const totalWeeklyMetaWithMargin = baseWeeklyMeta * (1 + state.safetyMargin);

            const daysToPayday = getDaysUntilPayday();
            let calculatedWeeklySalaryDiscount = 0;

            if (state.salaryValue > 0) {
                const weeksToPayday = Math.max(1, daysToPayday / 7);
                calculatedWeeklySalaryDiscount = state.salaryValue / weeksToPayday;
            }

            const finalNetWeeklyMeta = Math.max(0, totalWeeklyMetaWithMargin - calculatedWeeklySalaryDiscount);

            return {
                processedCards,
                totalBaseBill,
                totalPrepaid,
                totalLoansSum,
                totalMyShare,
                baseWeeklyMeta,
                totalWeeklyMeta: totalWeeklyMetaWithMargin,
                calculatedWeeklySalaryDiscount,
                finalNetWeeklyMeta
            };
        }

        window.switchTab = function(tabName) {
            state.activeTab = tabName;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            const activeNavBtn = document.getElementById(`nav-${tabName}`);
            if (activeNavBtn) activeNavBtn.classList.add('active');
            
            // Força a remoção do toast ativo ao trocar de aba por segurança
            hideToast();
            renderActiveTab();
        }

        function renderActiveTab() {
            const container = document.getElementById('main-content');
            const data = calculateWeeklyMetas();

            if (state.activeTab === 'dashboard') {
                renderDashboard(container, data);
            } else if (state.activeTab === 'cartoes') {
                renderCartoes(container, data);
            } else if (state.activeTab === 'partilhas') {
                renderPartilhas(container);
            } else if (state.activeTab === 'salario') {
                renderSalario(container);
            } else if (state.activeTab === 'diario') {
                renderDiario(container);
            }
        }

        window.adjustMargin = function(amount) {
            state.safetyMargin = Math.max(0, state.safetyMargin + amount);
            saveState();
            renderActiveTab();
        };

        // --- DASHBOARD ---
        function renderDashboard(container, data) {
            const marginPercent = Math.round(state.safetyMargin * 100);

            container.innerHTML = `
                <div class="meta-card">
                    <span class="meta-card-label">Meta Semanal Líquida Final</span>
                    <h2 class="meta-card-value">${formatBRL(data.finalNetWeeklyMeta)}</h2>
                    <p class="meta-card-desc">
                        Meta com margem (${formatBRL(data.totalWeeklyMeta)}) menos Abatimento Dinâmico de Salário (-${formatBRL(data.calculatedWeeklySalaryDiscount)}).
                    </p>
                </div>
                
                <div class="margin-controller-container">
                    <span class="margin-controller-label">Margem de Segurança:</span>
                    <div class="margin-controls-group">
                        <button class="btn-control" onclick="adjustMargin(-0.05)">-</button>
                        <span class="margin-val">${marginPercent}%</span>
                        <button class="btn-control" onclick="adjustMargin(0.05)">+</button>
                    </div>
                </div>

                <div class="summary-grid">
                    <div class="summary-card">
                        <span class="summary-label">Meta Faturas (Base)</span>
                        <span class="summary-value">${formatBRL(data.baseWeeklyMeta)}</span>
                    </div>
                    <div class="summary-card">
                        <span class="summary-label">Abatimento de Salário</span>
                        <span class="summary-value" style="color: #a78bfa;">-${formatBRL(data.calculatedWeeklySalaryDiscount)}</span>
                    </div>
                </div>

                <div class="summary-grid" style="grid-template-columns: 1fr 1fr 1fr; font-size: 11px;">
                    <div class="summary-card" style="padding: 10px;">
                        <span class="summary-label" style="font-size: 9px;">Total Faturas</span>
                        <span class="summary-value" style="font-size: 13px;">${formatBRL(data.totalBaseBill)}</span>
                    </div>
                    <div class="summary-card" style="padding: 10px;">
                        <span class="summary-label" style="font-size: 9px;">Coparticipações</span>
                        <span class="summary-value" style="font-size: 13px; color: var(--warning-color);">${formatBRL(data.totalLoansSum)}</span>
                    </div>
                    <div class="summary-card" style="padding: 10px;">
                        <span class="summary-label" style="font-size: 9px;">Total Adiantado</span>
                        <span class="summary-value" style="font-size: 13px; color: var(--success-color);">${formatBRL(data.totalPrepaid)}</span>
                    </div>
                </div>

                <h3 class="section-title">Esforço Semanal Requerido</h3>
                ${state.cards.length === 0 ? `
                    <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                        Nenhum cartão adicionado. Clique no botão "+" abaixo para começar!
                    </div>
                ` : data.processedCards.map(c => {
                    let color = c.daysRemaining < 0 ? 'rose' : (c.daysRemaining <= 7 ? 'amber' : 'green');
                    let displayDays = c.daysRemaining < 0 ? 'Atrasado' : `em ${c.daysRemaining} dias`;
                    let progress = Math.min(100, Math.max(0, ((c.prepaidAmount + c.loansTotal) / (c.totalBill || 1)) * 100));

                    return `
                        <div class="item-card">
                            <div class="item-card-header">
                                <div>
                                    <h4 class="item-title">${c.name}</h4>
                                    <span class="item-subtitle">Vencimento: ${c.computedDueDate.toLocaleDateString('pt-BR')} (${displayDays})</span>
                                </div>
                                <span class="status-pill ${color}">Meta Semanal: ${formatBRL(c.weeklyEffort * (1 + state.safetyMargin))}</span>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: -4px;">
                                <span>Progresso da Quitação (Adiantamentos + Coparticipação)</span>
                                <span>${Math.round(progress)}%</span>
                            </div>
                            <div class="progress-bar-container">
                                <div class="progress-bar-fill ${color}" style="width: ${progress}%"></div>
                            </div>

                            <div class="info-row">
                                <span>Fatura Base: ${formatBRL(c.totalBill)}</span>
                                <span>Coparticipação (Empréstimos): ${formatBRL(c.loansTotal)}</span>
                            </div>
                            <div class="info-row">
                                <span>Adiantamento efetuado: ${formatBRL(c.prepaidAmount)}</span>
                                <span style="font-weight: 800; color: #60a5fa;">Sua Parte Líquida: ${formatBRL(c.myShare)}</span>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;
        }

        // --- RENDER FATURAS ---
        function renderCartoes(container, data) {
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <h3 class="section-title" style="margin: 0;">Faturas Registradas</h3>
                </div>
                <div class="list-container">
                    ${state.cards.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum cartão cadastrado. Clique no botão "+" abaixo para adicionar o seu primeiro cartão!
                        </div>
                    ` : data.processedCards.map(c => `
                        <div class="item-card">
                            <div class="item-card-header">
                                <div>
                                    <h3 class="item-title">${c.name}</h3>
                                    <span class="item-subtitle">Próximo Vencimento: ${c.computedDueDate.toLocaleDateString('pt-BR')}</span>
                                </div>
                                <div class="item-value-side"><span class="item-value-label">Total Fatura</span><span class="item-value-main">${formatBRL(c.totalBill)}</span></div>
                            </div>
                            
                            <div class="info-row">
                                <span>Coparticipações (Empréstimos a terceiros)</span>
                                <span style="color: var(--warning-color);">- ${formatBRL(c.loansTotal)}</span>
                            </div>
                            <div class="info-row">
                                <span>Adiantamento efetuado</span>
                                <span style="color: var(--success-color);">- ${formatBRL(c.prepaidAmount)}</span>
                            </div>
                            <div class="info-row" style="border-top: 1px solid var(--border-color); font-weight: bold;">
                                <span style="color: white;">Parte Líquida a Pagar (Minha Parte)</span>
                                <span style="color: #60a5fa; font-size: 14px;">${formatBRL(c.myShare)}</span>
                            </div>

                            <div class="card-actions">
                                <div class="action-buttons-row">
                                    <button class="btn-action pay" onclick="openPayModal('${c.id}', '${c.name}')">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
                                        Adiantar (Débito/Pix)
                                    </button>
                                    <button class="btn-action edit" onclick="editCard('${c.id}')">Editar</button>
                                </div>
                                <button class="btn-action delete" onclick="deleteCard('${c.id}')">Excluir Cartão</button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- RENDER PARTILHAS (AGRUPADO POR PESSOA) ---
        function renderPartilhas(container) {
            const groupedLoans = {};
            
            state.loans.forEach(l => {
                const name = (l.debtorName || "Co-responsável").trim();
                if (!groupedLoans[name]) {
                    groupedLoans[name] = {
                        debtorName: name,
                        Santander: 0,
                        Nio: 0,
                        MercadoPago: 0,
                        PicPay: 0,
                        cardsLinked: new Set(),
                        ids: []
                    };
                }
                
                groupedLoans[name].Santander += parseFloat(l.Santander || 0);
                groupedLoans[name].Nio += parseFloat(l.Nio || 0);
                groupedLoans[name].MercadoPago += parseFloat(l.MercadoPago || 0);
                groupedLoans[name].PicPay += parseFloat(l.PicPay || 0);
                groupedLoans[name].ids.push(l.id);
                if (l.name) groupedLoans[name].cardsLinked.add(l.name);
            });

            const uniqueDebtors = Object.values(groupedLoans);

            container.innerHTML = `
                <h3 class="section-title">Coparticipações Ativas (Por Pessoa)</h3>
                <div class="list-container">
                    ${uniqueDebtors.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum registro de partilha. Clique no botão "+" e mude para a aba de "Partilha" para registrar quem lhe deve!
                        </div>
                    ` : uniqueDebtors.map(l => {
                        const total = l.Santander + l.Nio + l.MercadoPago + l.PicPay;
                        const cardsList = Array.from(l.cardsLinked).join(', ') || 'Nenhum especificado';
                        return `
                            <div class="item-card">
                                <div class="item-card-header">
                                    <div>
                                        <h3 class="item-title">${l.debtorName}</h3>
                                        <span class="item-subtitle" style="color: #60a5fa; font-weight: 600;">Cartões Usados: ${cardsList}</span>
                                    </div>
                                    <div class="item-value-side">
                                        <span class="item-value-label">Deve Total</span>
                                        <span class="item-value-main" style="color: var(--warning-color); font-size: 16px;">${formatBRL(total)}</span>
                                    </div>
                                </div>
                                
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 11px;">
                                    <div class="info-row"><span>Santander:</span><span>${formatBRL(l.Santander)}</span></div>
                                    <div class="info-row"><span>Nio:</span><span>${formatBRL(l.Nio)}</span></div>
                                    <div class="info-row"><span>Mercado Pago:</span><span>${formatBRL(l.MercadoPago)}</span></div>
                                    <div class="info-row"><span>PicPay:</span><span>${formatBRL(l.PicPay)}</span></div>
                                </div>

                                <div class="card-actions">
                                    <div class="action-buttons-row">
                                        <button class="btn-action edit" onclick="editGroupedLoan('${l.debtorName}')">Editar Tudo</button>
                                        <button class="btn-action delete" style="grid-column: span 1;" onclick="deleteGroupedLoan('${l.debtorName}')">Quitar/Excluir</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        window.editGroupedLoan = function(debtorName) {
            const loanObj = state.loans.find(l => (l.debtorName || "Co-responsável").trim() === debtorName);
            if (!loanObj) return;

            state.modalMode = 'edit';
            state.editingId = loanObj.id;
            state.modalFormTab = 'loan';

            document.getElementById('modal-title').textContent = `Editar Partilha de ${debtorName}`;
            document.getElementById('modal-tabs-container').style.display = 'none';
            document.getElementById('modal').classList.add('open');
            
            const grouped = { ...loanObj, Santander: 0, Nio: 0, MercadoPago: 0, PicPay: 0 };
            state.loans.forEach(l => {
                if((l.debtorName || "Co-responsável").trim() === debtorName) {
                    grouped.Santander += parseFloat(l.Santander || 0);
                    grouped.Nio += parseFloat(l.Nio || 0);
                    grouped.MercadoPago += parseFloat(l.MercadoPago || 0);
                    grouped.PicPay += parseFloat(l.PicPay || 0);
                }
            });

            state.loans = state.loans.filter(l => (l.debtorName || "Co-responsável").trim() !== debtorName || l.id === loanObj.id);
            renderFormFields(grouped);
        }

        window.deleteGroupedLoan = function(debtorName) {
            if (confirm(`Deseja remover completamente e dar baixa em todas as dívidas de ${debtorName}?`)) {
                let totalRemovido = 0;
                state.loans.forEach(l => {
                    if ((l.debtorName || "Co-responsável").trim() === debtorName) {
                        totalRemovido += getLoanTotal(l);
                    }
                });
                
                state.loans = state.loans.filter(l => (l.debtorName || "Co-responsável").trim() !== debtorName);
                logToJournal('remocao', `Quitação total das coparticipações de: ${debtorName}.`, -totalRemovido);
                saveState();
                renderActiveTab();
                showToast(`Dívidas de ${debtorName} quitadas!`);
            }
        }

        // --- RENDER SALÁRIO ---
        function renderSalario(container) {
            const daysLeft = getDaysUntilPayday();
            const calcs = calculateWeeklyMetas();
            
            container.innerHTML = `
                <h3 class="section-title">Configurações de Salário</h3>
                
                <div class="item-card" style="margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span class="item-title" style="color: #a78bfa;">Status do Mês</span>
                        <span class="status-pill green">Faltam ${daysLeft} dias</span>
                    </div>
                    <p style="font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px;">
                        Seu salário está previsto para o dia <strong>${state.salaryDay}</strong>. O sistema calcula a proximidade do pagamento automaticamente.
                    </p>
                    <div style="border-top: 1px dashed var(--border-color); padding-top: 10px; margin-top: 10px; display: flex; justify-content: space-between; font-size: 13px;">
                        <span style="color: var(--text-muted);">Abatimento Semanal Ativo:</span>
                        <span style="font-weight: 800; color: #a78bfa;">+ ${formatBRL(calcs.calculatedWeeklySalaryDiscount)} / semana</span>
                    </div>
                </div>

                <div class="item-card">
                    <form onsubmit="saveSalarySettings(event)">
                        <div class="form-group">
                            <label class="form-label">Valor Estimado do Salário Mensal (R$)</label>
                            <input type="number" step="0.01" min="0" required id="f-salary-value" class="form-input" placeholder="Ex: 1000.00" value="${state.salaryValue}">
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Dia de Recebimento do Salário</label>
                            <input type="number" min="1" max="31" required id="f-salary-day" class="form-input" placeholder="Ex: 1" value="${state.salaryDay}">
                        </div>

                        <button type="submit" class="btn-submit" style="background-color: var(--accent-color); margin-top: 16px;">Salvar Configurações de Salário</button>
                    </form>
                </div>
            `;
        }

        window.saveSalarySettings = function(e) {
            e.preventDefault();
            const salaryVal = parseFloat(document.getElementById('f-salary-value').value) || 0;
            const salaryD = parseInt(document.getElementById('f-salary-day').value) || 1;

            state.salaryValue = salaryVal;
            state.salaryDay = salaryD;

            saveState();
            logToJournal('salario', `Configuração de salário updated. Valor: ${formatBRL(salaryVal)}, Dia: ${salaryD}.`, salaryVal);
            showToast('Configurações de Salário salvas!');
            switchTab('dashboard');
        }

        // --- DIÁRIO ---
        function renderDiario(container) {
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                    <h3 class="section-title" style="margin: 0;">Registro Chronológico de Ações</h3>
                    <button class="btn-action delete" style="padding: 6px 12px; font-size: 10px; min-width: auto; flex: none" onclick="clearJournal()">Limpar Diário</button>
                </div>
                <div class="list-container">
                    ${state.history.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum registro no diário ainda.
                        </div>
                    ` : state.history.map(h => `
                        <div class="item-card" style="padding: 14px; gap: 8px;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <span class="log-tag ${h.type}">${h.type}</span>
                                    <span style="font-size: 10px; color: var(--text-muted);">${h.date}</span>
                                </div>
                                ${h.amount !== 0 ? `<span style="font-weight: 800; font-size: 12px; color: ${h.amount > 0 ? '#60a5fa' : '#f43f5e'}">${formatBRL(h.amount)}</span>` : ''}
                            </div>
                            <p style="font-size: 12px; line-height: 1.4; color: #cbd5e1;">${h.description}</p>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        window.clearJournal = function() {
            if (confirm("Tem certeza de que deseja limpar permanentemente todo o histórico do Livro Diário?")) {
                state.history = [
                    { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Livro Diário limpo pelo usuário.', amount: 0 }
                ];
                saveState();
                renderActiveTab();
                showToast("Diário limpo!");
            }
        }

        // --- EXPORTAÇÃO EXCEL ---
        window.exportToExcel = function() {
            try {
                const calcs = calculateWeeklyMetas();
                const wb = XLSX.utils.book_new();

                const summaryHeader = [
                    ["GESTOR FINANCEIRO - METAS SEMANAIS"],
                    ["Data da Exportação", new Date().toLocaleDateString('pt-BR')],
                    [],
                    ["MÉTRICAS GERAIS"],
                    ["Minha Meta Semanal Ajustada (Final)", calcs.finalNetWeeklyMeta],
                    ["Meta Semanal Base (Sem Margem)", calcs.baseWeeklyMeta],
                    ["Meta Semanal com Margem", calcs.totalWeeklyMeta],
                    ["Projeção de Abatimento Semanal de Salário", calcs.calculatedWeeklySalaryDiscount],
                    ["Salário Estimado Esperado", state.salaryValue],
                    ["Dia Configurado para Pagamento", state.salaryDay],
                    ["Margem de Segurança Aplicada", `${Math.round(state.safetyMargin * 100)}%`],
                    ["Minha Parte Líquida Total (Mês)", calcs.totalMyShare],
                    ["Total Bruto Faturas Cadastradas", calcs.totalBaseBill],
                    ["Total de Dívidas de Partilha", calcs.totalLoansSum],
                    ["Total de Pagamentos Adiantados", calcs.totalPrepaid],
                    [],
                    ["CONTROLE DE FATURAS E CARTÕES"],
                    ["Nome do Cartão", "Valor Total (R$)", "Data Vencimento Inicial", "Próximo Vencimento", "Dívida Devedores (R$)", "Adiantamento Pago (R$)", "Minha Parte Líquida (R$)", "Esforço Semanal Requerido (R$)", "Dias Restantes"]
                ];

                calcs.processedCards.forEach(c => {
                    summaryHeader.push([
                        c.name,
                        c.totalBill,
                        c.dueDate,
                        c.computedDueDate.toLocaleDateString('pt-BR'),
                        c.loansTotal,
                        c.prepaidAmount,
                        c.myShare,
                        c.weeklyEffort * (1 + state.safetyMargin),
                        c.daysRemaining
                    ]);
                });

                const wsSummary = XLSX.utils.aoa_to_sheet(summaryHeader);
                XLSX.utils.book_append_sheet(wb, wsSummary, "Resumo e Cartões");

                const loansHeader = [
                    ["DETALHAMENTO DE COPARTICIPAÇÕES"],
                    [],
                    ["Nome do Co-responsável", "Cartão Relacionado", "Santander (R$)", "Nio (R$)", "Mercado Pago (R$)", "PicPay (R$)", "Total Devedor (R$)"]
                ];

                state.loans.forEach(l => {
                    const total = getLoanTotal(l);
                    loansHeader.push([
                        l.debtorName || "Co-responsável",
                        l.name,
                        parseFloat(l.Santander || 0),
                        parseFloat(l.Nio || 0),
                        parseFloat(l.MercadoPago || 0),
                        parseFloat(l.PicPay || 0),
                        total
                    ]);
                });

                const wsLoans = XLSX.utils.aoa_to_sheet(loansHeader);
                XLSX.utils.book_append_sheet(wb, wsLoans, "Partilhas e Devedores");

                const journalHeader = [
                    ["LIVRO DIÁRIO - REGISTRO DE TRANSAÇÕES"],
                    [],
                    ["Data/Hora", "Tipo de Ação", "Descrição do Evento", "Valor Associado (R$)"]
                ];

                state.history.forEach(h => {
                    journalHeader.push([
                        h.date,
                        h.type,
                        h.description,
                        h.amount
                    ]);
                });

                const wsJournal = XLSX.utils.aoa_to_sheet(journalHeader);
                XLSX.utils.book_append_sheet(wb, wsJournal, "Livro Diário");

                XLSX.writeFile(wb, `Gestor_Financas_Completo.xlsx`);
                showToast("Arquivo Excel exportado!");
            } catch (err) {
                showToast("Erro ao gerar o arquivo Excel.");
            }
        }

        // --- GESTÃO DOS FORMULÁRIOS DINÂMICOS NOS MODAIS ---
        window.openAddModal = function() {
            state.modalMode = 'create';
            state.editingId = null;
            document.getElementById('modal-title').textContent = "Adicionar Novo Registro";
            document.getElementById('modal-tabs-container').style.display = 'grid';
            switchModalFormTab('card');
            document.getElementById('modal').classList.add('open');
        }

        window.closeAddModal = function() {
            document.getElementById('modal').classList.remove('open');
        }

        window.handleOverlayClick = function(e) {
            if (e.target.id === 'modal') closeAddModal();
        }

        window.switchModalFormTab = function(formTab) {
            state.modalFormTab = formTab;
            document.querySelectorAll('#modal-tabs-container button').forEach(b => b.classList.remove('active'));
            document.getElementById(`modal-tab-${formTab}`).classList.add('active');
            renderFormFields();
        }

        window.handleCardSelectChange = function() {
            const selectEl = document.getElementById('f-loan-cardname');
            if (!selectEl) return;
            const selectedCard = selectEl.value;
            
            document.getElementById('group-santander').style.display = 'none';
            document.getElementById('group-nio').style.display = 'none';
            document.getElementById('group-mp').style.display = 'none';
            document.getElementById('group-pp').style.display = 'none';
            
            const normalized = normalizeString(selectedCard);
            if (normalized.includes('santander')) {
                document.getElementById('group-santander').style.display = 'block';
            } else if (normalized.includes('nio') || normalized.includes('nubank')) {
                document.getElementById('group-nio').style.display = 'block';
            } else if (normalized.includes('mercado') || normalized.includes('pago')) {
                document.getElementById('group-mp').style.display = 'block';
            } else if (normalized.includes('picpay') || normalized.includes('pic')) {
                document.getElementById('group-pp').style.display = 'block';
            }
        }

        function renderFormFields(editData = null) {
            const fieldsContainer = document.getElementById('form-fields');
            
            if (state.modalFormTab === 'card') {
                fieldsContainer.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Nome identificador do Cartão/Fatura</label>
                        <input type="text" required id="f-card-name" class="form-input" placeholder="Ex: Santander, Visa Inter, Luz" value="${editData ? editData.name : ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Valor Bruto da Fatura Atual (R$)</label>
                        <input type="number" step="0.01" min="0" required id="f-card-bill" class="form-input" placeholder="Valor Total da Fatura" value="${editData ? editData.totalBill : ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Data de Vencimento do Cartão</label>
                        <input type="date" required id="f-card-date" class="form-input" value="${editData ? editData.dueDate : ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Valor de Adiantamento Inicial (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-card-prepaid" class="form-input" placeholder="Valor já adiantado" value="${editData ? editData.prepaid : '0'}">
                    </div>
                `;
            } else {
                let selectOptions = `<option value="" disabled selected>Selecione um cartão principal</option>`;
                if (state.cards.length === 0) {
                    selectOptions = `<option value="" disabled>Cadastre uma Fatura Primeiro!</option>`;
                } else {
                    state.cards.forEach(c => {
                        const isSelected = editData && normalizeString(editData.name) === normalizeString(c.name) ? 'selected' : '';
                        selectOptions += `<option value="${c.name}" ${isSelected}>${c.name}</option>`;
                    });
                }

                fieldsContainer.innerHTML = `
                    <div class="form-group">
                        <label class="form-label">Nome da Pessoa (Quem te deve)</label>
                        <input type="text" required id="f-loan-debtor" class="form-input" placeholder="Ex: Ângela" value="${editData ? (editData.debtorName || '') : ''}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Cartão Principal Associado</label>
                        <select required id="f-loan-cardname" onchange="handleCardSelectChange()" class="form-input" style="background-color: #0b0f19;">
                            ${selectOptions}
                        </select>
                    </div>
                    <div class="form-group" style="border-top: 1px dashed var(--border-color); padding-top: 12px; margin-top: 12px;">
                        <span class="form-label" style="font-weight: 800; color: white;">VALOR DA COPARTICIPAÇÃO:</span>
                    </div>
                    <div class="form-group" id="group-santander" style="display: none;">
                        <label class="form-label">Fração Santander (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-santander" class="form-input" value="${editData ? editData.Santander : '0'}">
                    </div>
                    <div class="form-group" id="group-nio" style="display: none;">
                        <label class="form-label">Fração Nio (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-nio" class="form-input" value="${editData ? editData.Nio : '0'}">
                    </div>
                    <div class="form-group" id="group-mp" style="display: none;">
                        <label class="form-label">Fração Mercado Pago (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-mp" class="form-input" value="${editData ? editData.MercadoPago : '0'}">
                    </div>
                    <div class="form-group" id="group-pp" style="display: none;">
                        <label class="form-label">Fração PicPay (R$)</label>
                        <input type="number" step="0.01" min="0" id="f-loan-pp" class="form-input" value="${editData ? editData.PicPay : '0'}">
                    </div>
                `;

                if (editData && editData.name) {
                    setTimeout(() => {
                        handleCardSelectChange();
                    }, 50);
                }
            }
        }

        window.saveRecord = function(e) {
            e.preventDefault();

            if (state.modalFormTab === 'card') {
                const name = document.getElementById('f-card-name').value.trim();
                const totalBill = parseFloat(document.getElementById('f-card-bill').value) || 0;
                const dueDate = document.getElementById('f-card-date').value;
                const prepaid = parseFloat(document.getElementById('f-card-prepaid').value) || 0;

                if (state.modalMode === 'edit') {
                    const idx = state.cards.findIndex(i => i.id === state.editingId);
                    if (idx !== -1) {
                        state.cards[idx] = { ...state.cards[idx], name, totalBill, dueDate, prepaid };
                        logToJournal('edicao', `Edição de cartão: ${name}. Fatura: ${formatBRL(totalBill)}.`, totalBill);
                    }
                } else {
                    state.cards.push({ id: Date.now().toString(), name, totalBill, dueDate, prepaid });
                    logToJournal('criacao', `Criação do cartão ${name}.`, totalBill);
                }
                switchTab('cartoes');
            } else {
                const debtorName = document.getElementById('f-loan-debtor').value.trim();
                const cardName = document.getElementById('f-loan-cardname').value;
                
                const Santander = parseFloat(document.getElementById('f-loan-santander')?.value || 0);
                const Nio = parseFloat(document.getElementById('f-loan-nio')?.value || 0);
                const MercadoPago = parseFloat(document.getElementById('f-loan-mp')?.value || 0);
                const PicPay = parseFloat(document.getElementById('f-loan-pp')?.value || 0);
                const sum = Santander + Nio + MercadoPago + PicPay;

                if (state.modalMode === 'edit') {
                    const idx = state.loans.findIndex(i => i.id === state.editingId);
                    if (idx !== -1) {
                        state.loans[idx] = { ...state.loans[idx], name: cardName, debtorName, Santander, Nio, MercadoPago, PicPay };
                        logToJournal('edicao', `Atualização da partilha de ${debtorName}. Total: ${formatBRL(sum)}.`, sum);
                    }
                } else {
                    state.loans.push({ id: Date.now().toString(), name: cardName, debtorName, Santander, Nio, MercadoPago, PicPay });
                    logToJournal('criacao', `Nova partilha para ${debtorName}. Valor: ${formatBRL(sum)}.`, sum);
                }
                switchTab('partilhas');
            }
            saveState();
            closeAddModal();
            showToast('Salvo com sucesso!');
        }

        window.editCard = function(id) {
            const cardObj = state.cards.find(i => i.id === id);
            if (!cardObj) return;

            state.modalMode = 'edit';
            state.editingId = id;
            state.modalFormTab = 'card';
            
            document.getElementById('modal-title').textContent = `Editar Cartão ${cardObj.name}`;
            document.getElementById('modal-tabs-container').style.display = 'none';
            document.getElementById('modal').classList.add('open');
            renderFormFields(cardObj);
        }

        window.deleteCard = function(id) {
            const cardObj = state.cards.find(i => i.id === id);
            if (cardObj && confirm(`Deseja excluir o cartão ${cardObj.name}?`)) {
                logToJournal('remocao', `Remoção do cartão: ${cardObj.name}.`, -cardObj.totalBill);
                state.cards = state.cards.filter(i => i.id !== id);
                saveState();
                renderActiveTab();
            }
        }

        window.openPayModal = function(id, name) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            document.getElementById('pay-card-id').value = id;
            document.getElementById('pay-card-label').textContent = `Adiantar Cartão: ${name} (Fatura: ${formatBRL(c.totalBill)})`;
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-modal').classList.add('open');
        }

        window.closePayModal = function() {
            document.getElementById('pay-modal').classList.remove('open');
        }

        window.handlePayOverlayClick = function(e) {
            if (e.target.id === 'pay-modal') closePayModal();
        }

        window.submitPayment = function(e) {
            e.preventDefault();
            const id = document.getElementById('pay-card-id').value;
            const amount = parseFloat(document.getElementById('pay-amount').value) || 0;

            const idx = state.cards.findIndex(c => c.id === id);
            if (idx !== -1) {
                const currentPrepaid = parseFloat(state.cards[idx].prepaid || 0);
                state.cards[idx].prepaid = currentPrepaid + amount;
                logToJournal('adiantamento', `Adiantamento efetuado no cartão ${state.cards[idx].name}.`, amount);
                saveState();
                closePayModal();
                showToast(`Pago ${formatBRL(amount)}!`);
                renderActiveTab();
            }
        }

        window.onload = function() {
            const realToday = getRealTodayString();
            simulatedTodayStr = realToday;
            updateSimulatedToday(realToday);
        };
    </script>
</body>
</html>
