<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meta Semanal - Super Central Financeira</title>
    <!-- Biblioteca SheetJS para geração de arquivos Excel nativos diretamente no navegador -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
    <style>
        /* --- ESTILOS NATIVOS CSS DE ALTO DESEMPENHO (Premium Dark Theme) --- */
        :root {
            --bg-main: #020617;
            --bg-card: #0f172a;
            --bg-input: #020617;
            --border-color: rgba(51, 65, 85, 0.6);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: rgba(16, 185, 129, 0.1);
            --secondary: #14b8a6;
            --accent-rose: #f43f5e;
            --accent-amber: #f59e0b;
            --accent-purple: #8b5cf6;
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -4px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* --- CABEÇALHO --- */
        header {
            background-color: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 40;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #020617;
            font-weight: 800;
            font-size: 18px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .header-title {
            font-size: 14px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.2;
        }

        .header-subtitle {
            font-size: 9px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-badge {
            font-size: 10px;
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 9999px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* --- BANNER DE ESTADO LOCAL --- */
        .sync-banner {
            background-color: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid var(--border-color);
            color: #cbd5e1;
            font-size: 10px;
            font-weight: 600;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            min-height: 40px;
            flex-shrink: 0;
        }

        .sync-banner-text {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            line-height: 1.4;
            flex: 1;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--primary);
            box-shadow: 0 0 8px var(--primary);
            display: inline-block;
            flex-shrink: 0;
        }

        /* Botão de Exportação */
        .btn-export {
            background-color: rgba(16, 185, 129, 0.15);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: var(--primary);
            font-size: 9px;
            font-weight: 700;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }

        .btn-export:hover {
            background-color: var(--primary);
            color: #020617;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 120px; /* Margem extra no fundo para não bater na navegação */
        }

        main::-webkit-scrollbar {
            display: none;
        }

        /* --- CONTAINER DO FLUXO VERTICAL SEGURO --- */
        .dashboard-flow {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        /* --- CARDS E MÉTRICAS --- */
        .meta-card {
            background: linear-gradient(135deg, var(--bg-card), #061510);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: var(--shadow-lg);
            width: 100%;
        }

        .meta-card-label {
            font-size: 10px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: block;
        }

        .meta-card-value {
            font-size: 32px;
            font-weight: 800;
            color: var(--primary);
            margin-top: 6px;
        }

        .meta-card-desc {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .summary-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 12px;
            width: 100%;
        }

        .summary-card {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .summary-label {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .summary-value {
            font-size: 15px;
            font-weight: 700;
            color: #f1f5f9;
            margin-top: 2px;
            display: block;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 2px;
        }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }

        .item-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(51, 65, 85, 0.8);
            border-radius: 14px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow: hidden;
            width: 100%;
            height: auto; /* Força altura automática */
        }

        .item-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .item-title-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        .status-dot.green { background-color: var(--primary); }
        .status-dot.amber { background-color: var(--accent-amber); }
        .status-dot.rose { background-color: var(--accent-rose); }
        .status-dot.purple { background-color: var(--accent-purple); }

        .item-title {
            font-size: 13px;
            font-weight: 800;
            color: #ffffff;
            word-break: break-all;
        }

        .item-subtitle {
            font-size: 10px;
            color: var(--text-muted);
        }

        .item-value-side {
            text-align: right;
            flex-shrink: 0;
        }

        .item-value-label {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .item-value-main {
            font-size: 13px;
            font-weight: 700;
            color: #e2e8f0;
        }

        .info-grid {
            background-color: #020617;
            padding: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 6px;
            font-size: 11px;
        }

        .info-grid-3 {
            background-color: #020617;
            padding: 10px;
            border-radius: 10px;
            display: grid;
            grid-template-cols: 1fr 1fr 1fr;
            gap: 8px;
            font-size: 12px;
            text-align: center;
            height: auto;
        }

        .info-cell {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .info-grid-label {
            font-size: 8px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .info-grid-value {
            font-weight: 700;
            color: #cbd5e1;
            font-size: 11px;
            word-break: break-all;
        }
        .info-grid-value.teal { color: var(--secondary); }
        .info-grid-value.emerald { color: var(--primary); }
        .info-grid-value.purple { color: var(--accent-purple); }

        .info-row {
            display: flex;
            justify-content: space-between;
            gap: 4px;
        }

        .info-row span:first-child { color: var(--text-muted); }
        .info-row span:last-child { font-weight: 700; color: #cbd5e1; }

        /* Progress Bar para Objetivos de Poupança */
        .progress-container {
            width: 100%;
            background-color: rgba(51, 65, 85, 0.4);
            height: 6px;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 4px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 999px;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* --- CONTROLES DE AÇÕES DOS CARTÕES --- */
        .card-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(51, 65, 85, 0.4);
            font-size: 11px;
        }

        @media (min-width: 480px) {
            .card-actions {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .meta-base-text {
            color: var(--text-muted);
            line-height: 1.4;
        }

        .meta-base-value {
            color: var(--primary);
            font-weight: 800;
        }

        .action-button-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            width: 100%;
        }

        @media (min-width: 480px) {
            .action-button-group {
                width: auto;
                justify-content: flex-end;
            }
        }

        .btn-action {
            flex: 1;
            min-width: 65px;
            padding: 6px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-align: center;
            white-space: normal;
            word-break: break-word;
            line-height: 1.2;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 30px;
        }

        .btn-action.pay {
            flex: 1.3 1 auto;
        }

        @media (min-width: 480px) {
            .btn-action {
                flex: none;
                min-width: 75px;
                padding: 8px 10px;
            }
            .btn-action.pay {
                flex: none;
                min-width: 110px;
            }
        }

        .btn-action.edit { background-color: rgba(51, 65, 85, 0.8); color: #cbd5e1; }
        .btn-action.delete { background-color: rgba(244, 63, 94, 0.1); color: var(--accent-rose); border: 1px solid rgba(244, 63, 94, 0.2); }
        .btn-action.pay { background-color: rgba(20, 184, 166, 0.15); color: var(--secondary); border: 1px solid rgba(20, 184, 166, 0.3); }

        /* --- ELEMENTOS DO LIVRO DIÁRIO --- */
        .journal-badge {
            font-size: 8px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
            display: inline-block;
        }
        .journal-badge.criacao { background-color: rgba(16, 185, 129, 0.15); color: var(--primary); }
        .journal-badge.edicao { background-color: rgba(245, 158, 11, 0.15); color: var(--accent-amber); }
        .journal-badge.remocao { background-color: rgba(244, 63, 94, 0.15); color: var(--accent-rose); }
        .journal-badge.adiantamento { background-color: rgba(20, 184, 166, 0.15); color: var(--secondary); }

        /* --- CONTROLES DE MARGEM INTERATIVOS --- */
        .margin-controller-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--border-color);
            padding: 12px 14px;
            border-radius: 14px;
            gap: 12px;
            width: 100%;
        }

        .margin-controller-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .margin-controls-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-margin-adjust {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: #ffffff;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            user-select: none;
            transition: all 0.1s ease;
        }

        .btn-margin-adjust:active {
            background-color: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .margin-display-value {
            font-size: 12px;
            font-weight: 800;
            color: var(--secondary);
            min-width: 40px;
            text-align: center;
        }

        /* --- NAVEGAÇÃO INFERIOR RESPONSIVA DE 6 ABAS --- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background-color: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-color);
            padding: 8px 4px 12px 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 40;
            gap: 1px;
        }

        .nav-btn {
            background: none;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            flex: 1;
            min-width: 0;
        }

        .nav-btn.active { color: var(--primary); }
        .nav-btn span { font-size: 8px; font-weight: 700; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; text-align: center; }
        .nav-btn-icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; }

        .nav-add-btn {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: #020617;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: translateY(-10px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            flex-shrink: 0;
            margin: 0 2px;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(2, 6, 23, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 16px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .modal-overlay.open { opacity: 1; pointer-events: auto; }
        .modal-container {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 448px;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            border: 1px solid var(--border-color);
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-overlay.open .modal-container { transform: translateY(0); }

        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 14px; }
        .modal-title { font-size: 15px; font-weight: 700; color: #ffffff; }
        .modal-close { background: none; border: none; color: var(--text-muted); cursor: pointer; }

        .modal-tabs { display: flex; background-color: var(--bg-main); padding: 4px; border-radius: 12px; margin-bottom: 14px; gap: 4px; flex-wrap: wrap; }
        .modal-tab-btn { flex: 1; min-width: 80px; background: none; border: none; color: var(--text-muted); font-size: 10px; font-weight: 700; padding: 6px; border-radius: 8px; cursor: pointer; }
        .modal-tab-btn.active { background-color: var(--primary); color: #020617; }

        /* Formulários */
        .form-group { margin-bottom: 12px; }
        .form-grid-2 { display: grid; grid-template-cols: 1fr 1fr; gap: 10px; }
        .form-label { display: block; font-size: 9px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .form-control { width: 100%; background-color: var(--bg-input); border: 1px solid var(--border-color); border-radius: 10px; padding: 10px; color: #ffffff; font-size: 13px; outline: none; }

        .btn-submit {
            width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; color: #020617; font-size: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-brand">
            <div class="header-logo">$</div>
            <div>
                <h1 class="header-title">Meta Semanal</h1>
                <p class="header-subtitle">Planejamento Exato por Data</p>
            </div>
        </div>
        <div class="header-badge" id="current-badge-date">Mês Corrente</div>
    </header>

    <!-- Indicador de Segurança Local com Botão Exportar Excel -->
    <div id="sync-status-banner" class="sync-banner">
        <div class="sync-banner-text">
            <span class="sync-dot"></span>
            <span>Armazenamento Local Seguro (Privado &amp; Offline)</span>
        </div>
        <button class="btn-export" onclick="exportDataToExcel()">
            <svg style="width:11px; height:11px; fill:currentColor" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
            </svg>
            Excel
        </button>
    </div>

    <main id="main-content">
        <!-- Injetado Dinamicamente pelo script em formato de fluxo flexível vertical -->
    </main>

    <!-- BARRA DE NAVEGAÇÃO SUPER ADAPTATIVA DE 6 SEÇÕES -->
    <nav>
        <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-btn active">
            <svg class="nav-btn-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" /></svg>
            <span>Painel</span>
        </button>
        <button onclick="switchTab('cartoes')" id="nav-cartoes" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" /></svg>
            <span>Cartões</span>
        </button>
        <button onclick="switchTab('poupancas')" id="nav-poupancas" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            <span>Poupar</span>
        </button>
        <button onclick="openAddModal()" class="nav-add-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        </button>
        <button onclick="switchTab('receitas')" id="nav-receitas" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" /></svg>
            <span>Ganhos</span>
        </button>
        <button onclick="switchTab('diarios')" id="nav-diarios" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" /></svg>
            <span>Caixa</span>
        </button>
        <button onclick="switchTab('diario')" id="nav-diario" class="nav-btn">
            <svg class="nav-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
            <span>Diário</span>
        </button>
    </nav>

    <!-- MODAL PRINCIPAL COMPACTO -->
    <div id="modal" class="modal-overlay" onclick="handleOverlayClick(event)">
        <div class="modal-container">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Novo Registro</h3>
                <button onclick="closeAddModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="modal-tabs">
                <button type="button" onclick="setModalType('cartao')" id="m-tab-cartao" class="modal-tab-btn active">Cartão</button>
                <button type="button" onclick="setModalType('poupanca')" id="m-tab-poupanca" class="modal-tab-btn">Poupança</button>
                <button type="button" onclick="setModalType('receita')" id="m-tab-receita" class="modal-tab-btn">Ganho</button>
                <button type="button" onclick="setModalType('partilha')" id="m-tab-partilha" class="modal-tab-btn">Partilha</button>
                <button type="button" onclick="setModalType('diario')" id="m-tab-diario" class="modal-tab-btn">Gasto Diário</button>
            </div>
            <form id="modal-form" onsubmit="saveRecord(event)">
                <div id="form-fields"></div>
                <button type="submit" class="btn-submit">Confirmar Salvar</button>
            </form>
        </div>
    </div>

    <!-- MODAL DE ADIANTAMENTO RÁPIDO (DÉBITO) -->
    <div id="pay-modal" class="modal-overlay" onclick="handlePayOverlayClick(event)">
        <div class="modal-container" style="border-radius: 24px; padding: 24px;">
            <div class="modal-header">
                <h3 class="modal-title">Registrar Adiantamento (Débito/Pix)</h3>
                <button onclick="closePayModal()" class="modal-close">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <form id="pay-form" onsubmit="submitPayment(event)">
                <input type="hidden" id="pay-card-id">
                <div class="form-group">
                    <label class="form-label" id="pay-card-label">Cartão: -</label>
                    <input type="number" step="0.01" id="pay-amount" required class="form-control" placeholder="Valor a adiantar (R$)">
                </div>
                <button type="submit" class="btn-submit" style="background: linear-gradient(135deg, var(--secondary), var(--primary));">Confirmar Pagamento</button>
            </form>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toast-msg">Salvo!</span></div>

    <!-- SCRIPT FINANÇAS LOCAIS -->
    <script>
        // 🛡️ LISTAS INICIAIS VAZIAS PARA PRIVACIDADE NO GITHUB PÚBLICO
        const initialCards = [];
        const initialLoans = [];
        const initialSavings = [];
        const initialIncomes = [];
        const initialDailyExpenses = [];
        const initialHistory = [
            { id: 'sys-init', date: new Date().toLocaleString('pt-BR'), type: 'criacao', description: 'Sistema de Livro Diário inicializado com sucesso.', amount: 0 }
        ];

        // Estado carregado diretamente do armazenamento local (localStorage)
        let state = {
            cards: JSON.parse(localStorage.getItem('w_cards_exact_v2')) || initialCards,
            loans: JSON.parse(localStorage.getItem('w_loans_exact_v2')) || initialLoans,
            savings: JSON.parse(localStorage.getItem('w_savings_exact_v2')) || initialSavings,
            incomes: JSON.parse(localStorage.getItem('w_incomes_exact_v2')) || initialIncomes,
            dailyExpenses: JSON.parse(localStorage.getItem('w_daily_v2')) || initialDailyExpenses,
            history: JSON.parse(localStorage.getItem('w_history_exact_v2')) || initialHistory,
            currentTab: 'dashboard',
            modalType: 'cartao',
            editingId: null,
            safetyMargin: parseFloat(localStorage.getItem('w_safety_margin_v2')) !== null && !isNaN(parseFloat(localStorage.getItem('w_safety_margin_v2'))) ? parseFloat(localStorage.getItem('w_safety_margin_v2')) : 0.25,
            dailyTeto: parseFloat(localStorage.getItem('w_daily_teto_v2')) || 200.00
        };

        function getRealTodayString() {
            const todayReal = new Date();
            const yearReal = todayReal.getFullYear();
            const monthReal = String(todayReal.getMonth() + 1).padStart(2, '0');
            const dayReal = String(todayReal.getDate()).padStart(2, '0');
            return `${yearReal}-${monthReal}-${dayReal}`;
        }

        let simulatedTodayStr = localStorage.getItem('simulated_today') || getRealTodayString();

        function saveState() {
            localStorage.setItem('w_cards_exact_v2', JSON.stringify(state.cards));
            localStorage.setItem('w_loans_exact_v2', JSON.stringify(state.loans));
            localStorage.setItem('w_savings_exact_v2', JSON.stringify(state.savings));
            localStorage.setItem('w_incomes_exact_v2', JSON.stringify(state.incomes));
            localStorage.setItem('w_daily_v2', JSON.stringify(state.dailyExpenses));
            localStorage.setItem('w_history_exact_v2', JSON.stringify(state.history));
            localStorage.setItem('w_safety_margin_v2', state.safetyMargin.toString());
            localStorage.setItem('w_daily_teto_v2', state.dailyTeto.toString());
            localStorage.setItem('simulated_today', simulatedTodayStr);
        }

        // Função para acrescentar entradas no Livro Diário de forma cronológica
        function logToJournal(type, description, amount) {
            const timestamp = new Date().toLocaleString('pt-BR');
            state.history.unshift({
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                date: timestamp,
                type: type,
                description: description,
                amount: parseFloat(amount)
            });
            saveState();
        }

        function formatBRL(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateSimulatedToday(val) {
            simulatedTodayStr = val;
            saveState();
            const dateObj = new Date(simulatedTodayStr + 'T00:00:00');
            const monthNames = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            document.getElementById('current-badge-date').textContent = `${monthNames[dateObj.getMonth()]} ${dateObj.getFullYear()}`;
            renderActiveTab();
        }

        window.adjustSafetyMargin = function(increment) {
            let currentPercentage = Math.round(state.safetyMargin * 100);
            let newPercentage = currentPercentage + (increment ? 5 : -5);
            if (newPercentage < 0) newPercentage = 0;
            if (newPercentage > 100) newPercentage = 100;
            state.safetyMargin = newPercentage / 100;
            saveState();
            renderActiveTab();
            showToast(`Margem de segurança ajustada para ${newPercentage}%`);
        };

        window.updateDailyTeto = function(val) {
            state.dailyTeto = parseFloat(val) || 0;
            saveState();
            renderActiveTab();
            showToast(`Teto semanal diário ajustado!`);
        };

        // --- CALCULA A DATA DE VENCIMENTO DO PRÓXIMO CICLO COM ROLLOVER INTELIGENTE ---
        function getNextDueDate(dueDay, today) {
            let year = today.getFullYear();
            let month = today.getMonth();
            let candidate = new Date(year, month, dueDay, 0, 0, 0);
            const diffTime = candidate - today;
            const diffDays = diffTime / (1000 * 60 * 60 * 24);
            if (candidate < today || diffDays < 7) {
                candidate = new Date(year, month + 1, dueDay, 0, 0, 0);
            }
            return candidate;
        }

        function runCalculations() {
            const today = new Date(simulatedTodayStr + 'T00:00:00');

            // 1. Receitas Totais do Mês
            const totalMonthlyIncome = state.incomes.reduce((sum, i) => sum + parseFloat(i.value || 0), 0);
            const weeklyIncome = totalMonthlyIncome / 4.33;

            // 2. Partilhas / Parcerias ativas
            const cardLoans = { NIO: 0, MP: 0, SAN: 0, PP: 0 };
            state.loans.forEach(l => {
                cardLoans.MP += parseFloat(l.MP || 0);
                cardLoans.PP += parseFloat(l.PP || 0);
                cardLoans.SAN += parseFloat(l.SAN || 0);
                cardLoans.NIO += parseFloat(l.NIO || 0);
            });
            const totalEmprestimos = Object.values(cardLoans).reduce((a, b) => a + b, 0);

            // 3. Faturas dos Cartões e Adiantamentos
            let totalCardsBill = 0;
            let totalPrepaid = 0;
            let totalWeeklyFaturas = 0;

            const processedCards = state.cards.map(c => {
                const prepaidAmount = parseFloat(c.prepaid || 0);
                totalPrepaid += prepaidAmount;
                totalCardsBill += c.totalBill;

                let loansOnThisCard = 0;
                const nameUpper = c.name.toUpperCase();
                
                if (nameUpper.includes('NIO')) loansOnThisCard = cardLoans.NIO;
                else if (nameUpper.includes('MERCADO') || nameUpper.includes('MP')) loansOnThisCard = cardLoans.MP;
                else if (nameUpper.includes('SANTANDER') || nameUpper.includes('SAN')) loansOnThisCard = cardLoans.SAN;
                else if (nameUpper.includes('PICPAY') || nameUpper.includes('PP')) loansOnThisCard = cardLoans.PP;

                let myShare = c.totalBill - loansOnThisCard - prepaidAmount;
                if (myShare < 0) myShare = 0;
                
                const computedDueDate = getNextDueDate(c.dueDay, today);
                const diffTime = computedDueDate - today;
                let diffDays = diffTime / (1000 * 60 * 60 * 24);
                let calculatedWeeks = diffDays / 7;
                if (calculatedWeeks < 1.0) calculatedWeeks = 1.0;

                const weeklyContribution = myShare / calculatedWeeks;
                totalWeeklyFaturas += weeklyContribution;

                return {
                    ...c,
                    loansTotal: loansOnThisCard,
                    prepaidAmount,
                    myShare,
                    computedDueDate,
                    daysRemaining: diffDays,
                    calculatedWeeks,
                    weeklyTarget: weeklyContribution
                };
            });

            // 4. Objetivos de Poupança Semanais
            let totalWeeklySavingsGoal = 0;
            let totalSavedAmount = 0;
            let totalSavingsGoal = 0;

            const processedSavings = state.savings.map(s => {
                const currentSaved = parseFloat(s.saved || 0);
                const target = parseFloat(s.target || 0);
                totalSavedAmount += currentSaved;
                totalSavingsGoal += target;

                const limitDate = new Date(s.limitDate + 'T00:00:00');
                const diffTime = limitDate - today;
                const diffDays = diffTime / (1000 * 60 * 60 * 24);
                let calculatedWeeks = diffDays / 7;
                if (calculatedWeeks < 1.0) calculatedWeeks = 1.0;

                const neededToSave = target - currentSaved;
                let weeklyContribution = neededToSave > 0 ? (neededToSave / calculatedWeeks) : 0;
                totalWeeklySavingsGoal += weeklyContribution;

                const progressPercent = Math.min(100, Math.round((currentSaved / target) * 100)) || 0;

                return {
                    ...s,
                    currentSaved,
                    target,
                    limitDateObj: limitDate,
                    calculatedWeeks,
                    progressPercent,
                    weeklyTarget: weeklyContribution
                };
            });

            // 5. Gastos Diários Flutuantes
            const currentWeekDailyTotal = state.dailyExpenses.reduce((sum, e) => sum + parseFloat(e.amount || 0), 0);
            const remainingDailyTeto = Math.max(0, state.dailyTeto - currentWeekDailyTotal);

            // 6. Consolidação Geral
            const baseWeeklyMeta = totalWeeklyFaturas + totalWeeklySavingsGoal;
            const marginAddition = baseWeeklyMeta * state.safetyMargin;
            const totalWeeklyMetaWithMargin = baseWeeklyMeta + marginAddition;

            // Saldo Livre Mensal Real Estimado (Receitas - Despesas de Cartão + O que vai receber de partilhas - Gasto Flutuante)
            const estimatedFreeMonthlySalary = totalMonthlyIncome - totalCardsBill + totalEmprestimos - (state.dailyTeto * 4.33);

            const incomeCommitmentPercent = weeklyIncome > 0 ? Math.min(100, Math.round((totalWeeklyMetaWithMargin / weeklyIncome) * 100)) : 0;

            return {
                processedCards,
                processedSavings,
                baseWeeklyMeta,
                marginAddition,
                totalWeeklyMeta: totalWeeklyMetaWithMargin,
                totalPrepaid,
                totalMonthlyIncome,
                weeklyIncome,
                estimatedFreeMonthlySalary,
                incomeCommitmentPercent,
                currentWeekDailyTotal,
                remainingDailyTeto,
                totalSavedAmount,
                totalSavingsGoal,
                totalCardsBill,
                totalEmprestimos,
                cardLoans
            };
        }

        function switchTab(tab) {
            state.currentTab = tab;
            ['nav-dashboard', 'nav-cartoes', 'nav-poupancas', 'nav-receitas', 'nav-diarios', 'nav-diario'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.classList.remove('active');
            });
            const activeEl = document.getElementById(`nav-${tab}`);
            if (activeEl) activeEl.classList.add('active');
            renderActiveTab();
        }

        function renderActiveTab() {
            const container = document.getElementById('main-content');
            if (!container) return;
            const data = runCalculations();
            container.innerHTML = '';

            if (state.currentTab === 'dashboard') {
                renderDashboard(container, data);
            } else if (state.currentTab === 'cartoes') {
                renderCartoes(container, data);
            } else if (state.currentTab === 'poupancas') {
                renderPoupancas(container, data);
            } else if (state.currentTab === 'receitas') {
                renderReceitasEPartilhas(container, data);
            } else if (state.currentTab === 'diarios') {
                renderGastosDiarios(container, data);
            } else if (state.currentTab === 'diario') {
                renderDiario(container);
            }
        }

        // --- FLUXO ESTRUTURAL COMPLETO E SEGURO DO PAINEL PRINCIPAL ---
        function renderDashboard(container, data) {
            const marginPercent = Math.round(state.safetyMargin * 100);

            // Cria um fluxo de elementos verticais 100% isolado por CSS Flexbox
            container.innerHTML = `
                <div class="dashboard-flow">
                    <!-- 1. VALOR DA META SEMANAL DINÂMICA COMPLETA -->
                    <div class="meta-card">
                        <span class="meta-card-label">Sua Meta Semanal Geral</span>
                        <h2 class="meta-card-value">${formatBRL(data.totalWeeklyMeta)}</h2>
                        <p class="meta-card-desc">Faturas + Objetivos de Poupança + Margem (+${marginPercent}%)</p>
                    </div>

                    <!-- 2. BALANÇO DE RECEITA E COMPROMETIMENTO -->
                    <div class="summary-grid">
                        <div class="summary-card">
                            <span class="summary-label">Salário Livre Estimado</span>
                            <span class="summary-value" style="color: var(--primary);">${formatBRL(data.estimatedFreeMonthlySalary)}</span>
                        </div>
                        <div class="summary-card">
                            <span class="summary-label">Comprometido Semanal</span>
                            <span class="summary-value" style="color: ${data.incomeCommitmentPercent > 70 ? 'var(--accent-rose)' : 'var(--accent-amber)'};">${data.incomeCommitmentPercent}% da renda</span>
                        </div>
                    </div>

                    <!-- 3. CONTROLE DE CAIXA DE GASTOS DIÁRIOS FLUTUANTES (Opção 3 - TOTALMENTE ISOLADO) -->
                    <div class="item-card" style="border-color: rgba(20, 184, 166, 0.4); background: linear-gradient(135deg, var(--bg-card), rgba(2, 6, 23, 0.6));">
                        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(51, 65, 85, 0.4); padding-bottom: 8px; flex-wrap: wrap; gap: 8px; width: 100%;">
                            <span class="margin-controller-label" style="color: var(--secondary); white-space: normal;">Controle de Gastos Diários</span>
                            <div style="display: flex; align-items: center; gap: 6px; flex-shrink: 0;">
                                <span style="font-size: 8px; color: var(--text-muted);">Teto:</span>
                                <input type="number" class="form-control" style="width: 70px; padding: 4px; font-size: 11px; height: 24px;" value="${state.dailyTeto}" onchange="updateDailyTeto(this.value)">
                            </div>
                        </div>
                        
                        <div style="margin-top: 4px; width: 100%;">
                            <div class="progress-container" style="height: 8px;"><div class="progress-bar" style="width: ${Math.min(100, Math.round((data.currentWeekDailyTotal / state.dailyTeto) * 100))}%; background: var(--secondary)"></div></div>
                        </div>

                        <div class="info-grid-3" style="background: transparent; padding: 8px 0 0 0; gap: 4px; width: 100%;">
                            <div class="info-cell">
                                <span class="info-grid-label" style="font-size: 7px;">Teto Semanal</span>
                                <span class="info-grid-value" style="color: #cbd5e1; font-size: 10px;">${formatBRL(state.dailyTeto)}</span>
                            </div>
                            <div class="info-cell">
                                <span class="info-grid-label" style="font-size: 7px;">Gasto na Semana</span>
                                <span class="info-grid-value" style="color: var(--accent-rose); font-size: 10px;">${formatBRL(data.currentWeekDailyTotal)}</span>
                            </div>
                            <div class="info-cell">
                                <span class="info-grid-label" style="font-size: 7px; color: var(--primary);">Disponível</span>
                                <span class="info-grid-value" style="color: var(--primary); font-weight: 800; font-size: 10px;">${formatBRL(data.remainingDailyTeto)}</span>
                            </div>
                        </div>
                    </div>

                    <!-- 4. CONTROLE INTERATIVO DA MARGEM DE SEGURANÇA -->
                    <div class="margin-controller-container">
                        <span class="margin-controller-label">Margem de Segurança:</span>
                        <div class="margin-controls-group">
                            <div class="btn-margin-adjust" onclick="adjustSafetyMargin(false)">-</div>
                            <span class="margin-display-value">${marginPercent}%</span>
                            <div class="btn-margin-adjust" onclick="adjustSafetyMargin(true)">+</div>
                        </div>
                    </div>

                    <!-- 5. RESUMO GERAL DAS CONTAS -->
                    <div class="summary-grid" style="grid-template-cols: 1fr 1fr 1fr; gap: 8px;">
                        <div class="summary-card" style="padding: 10px 6px;">
                            <span class="summary-label" style="font-size: 8px;">Faturas Totais</span>
                            <span class="summary-value" style="font-size: 13px;">${formatBRL(data.totalCardsBill)}</span>
                        </div>
                        <div class="summary-card" style="padding: 10px 6px;">
                            <span class="summary-label" style="font-size: 8px; color: var(--secondary)">A Receber</span>
                            <span class="summary-value" style="font-size: 13px; color: var(--secondary);">${formatBRL(data.totalEmprestimos)}</span>
                        </div>
                        <div class="summary-card" style="padding: 10px 6px; background-color: rgba(20, 184, 166, 0.05);">
                            <span class="summary-label" style="font-size: 8px; color: var(--primary)">Renda Mensal</span>
                            <span class="summary-value" style="font-size: 13px; color: var(--primary);">${formatBRL(data.totalMonthlyIncome)}</span>
                        </div>
                    </div>
                    
                    <!-- 6. ESFORÇO SEMANAL REQUERIDO -->
                    <div class="list-container">
                        <h3 class="section-title">Esforço Semanal Requerido</h3>
                        ${state.cards.length === 0 && state.savings.length === 0 ? `
                            <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                                Nenhum cartão ou objetivo adicionado. Clique no botão "+" abaixo para começar!
                            </div>
                        ` : `
                            ${data.processedCards.map(c => {
                                let color = c.daysRemaining < 0 ? 'rose' : (c.daysRemaining <= 7 ? 'amber' : 'green');
                                let rawWeeks = c.calculatedWeeks;
                                let formattedWeeks = rawWeeks % 1 === 0 ? rawWeeks.toFixed(0) : rawWeeks.toFixed(1);
                                return `
                                    <div class="item-card" style="flex-direction: row; justify-content: space-between; align-items: center; padding: 12px 14px;">
                                        <div>
                                            <div class="item-title-wrapper"><span class="status-dot ${color}"></span><span class="item-title">${c.name}</span></div>
                                            <span class="item-subtitle" style="display: block; margin-left: 18px;">Faltam ${formattedWeeks} sem</span>
                                        </div>
                                        <div style="text-align: right;">
                                            <span class="item-value-main" style="color: var(--primary); font-weight: 800;">${formatBRL(c.weeklyTarget)}/sem</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                            ${data.processedSavings.map(s => {
                                let rawWeeks = s.calculatedWeeks;
                                let formattedWeeks = rawWeeks % 1 === 0 ? rawWeeks.toFixed(0) : rawWeeks.toFixed(1);
                                return `
                                    <div class="item-card" style="flex-direction: row; justify-content: space-between; align-items: center; padding: 12px 14px; border-color: rgba(139, 92, 246, 0.4); background: linear-gradient(135deg, var(--bg-card), #080314);">
                                        <div>
                                            <div class="item-title-wrapper"><span class="status-dot purple"></span><span class="item-title">${s.name} (Poupar)</span></div>
                                            <span class="item-subtitle" style="display: block; margin-left: 18px;">Meta em ${formattedWeeks} sem</span>
                                        </div>
                                        <div style="text-align: right;">
                                            <span class="item-value-main" style="color: var(--accent-purple); font-weight: 800;">${formatBRL(s.weeklyTarget)}/sem</span>
                                        </div>
                                    </div>
                                `;
                            }).join('')}
                        `}
                    </div>
                </div>
            `;
        }

        function renderCartoes(container, data) {
            container.innerHTML = `
                <div class="list-container">
                    ${state.cards.length === 0 ? `
                        <div class="item-card" style="text-align: center; padding: 24px; color: var(--text-muted); border: 1px dashed var(--border-color);">
                            Nenhum cartão cadastrado. Clique no botão "+" abaixo para adicionar o seu primeiro cartão!
                        </div>
                    ` : data.processedCards.map(c => {
                        let rawWeeks = c.calculatedWeeks;
                        let formattedWeeks = rawWeeks % 1 === 0 ? rawWeeks.toFixed(0) : rawWeeks.toFixed(1);
                        return `
                            <div class="item-card">
                                <div class="item-card-header">
                                    <div>
                                        <h3 class="item-title">${c.name}</h3>
                                        <span class="item-subtitle">Vencimento: Dia ${c.dueDay} (Faltam ${formattedWeeks} sem)</span>
                                    </div>
                                    <div class="item-value-side"><span class="item-value-label">Total</span><span class="item-value-main">${formatBRL(c.totalBill)}</span></div>
                                </div>
                                <div class="info-grid-3">
                                    <div class="info-cell"><span class="info-grid-label">Parcerias (Devedores)</span><span class="info-grid-value teal">${formatBRL(c.loansTotal)}</span></div>
                                    <div class="info-cell"><span class="info-grid-label">Adiantado</span><span class="info-grid-value emerald" style="color: var(--secondary);">${formatBRL(c.prepaidAmount)}</span></div>
                                    <div class="info-cell"><span class="info-grid-label">Líquido em Aberto</span><span class="info-grid-value" style="color: #cbd5e1;">${formatBRL(c.myShare)}</span></div>
                                </div>
                                <div class="card-actions">
                                    <span class="meta-base-text">Meta Base: <strong class="meta-base-value">${formatBRL(c.weeklyTarget)}/sem</strong></span>
                                    <div class="action-button-group">

        // --- EXPORTAR EXCEL COMPLETO DE 5 ABAS ---
        window.exportDataToExcel = function() {
            try {
                const calcs = runCalculations();
                const wb = XLSX.utils.book_new();

                // 1. Resumo & Cartões
                const summaryHeader = [
                    ["SUPER CENTRAL FINANCEIRA - METAS SEMANAIS"],
                    ["Data de Exportação", new Date().toLocaleDateString('pt-BR')],
                    [],
                    ["MÉTRICAS SEMANAIS CONSOLIDADAS"],
                    ["Minha Meta Semanal Geral (Com Margem)", calcs.totalWeeklyMeta],
                    ["Meta Semanal Base", calcs.baseWeeklyMeta],
                    [`Margem de Segurança Adicional (${Math.round(state.safetyMargin * 100)}%)`, calcs.marginAddition],
                    ["Total de Faturas de Cartão", calcs.totalCardsBill],
                    ["Total de Metas de Poupança (Semanal)", state.savings.reduce((sum, s) => sum + (parseFloat(s.target || 0) / 4.33), 0)],
                    ["Saldo Livre Mensal Real Estimado", calcs.estimatedFreeMonthlySalary],
                    [],
                    ["DETALHE DE CARTÕES & DESPESAS"],
                    ["Cartão", "Fatura Bruta (R$)", "Dia Vencimento", "Próximo Vencimento", "Parcerias (R$)", "Adiantado (R$)", "Saldo Restante", "Meta Semanal (R$)"]
                ];
                calcs.processedCards.forEach(c => {
                    summaryHeader.push([
                        c.name, c.totalBill, c.dueDay, c.computedDueDate.toLocaleDateString('pt-BR'), c.loansTotal, c.prepaidAmount, c.myShare, parseFloat(c.weeklyTarget.toFixed(2))
                    ]);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryHeader), "Resumo & Cartões");

                // 2. Objetivos de Poupança
                const savingsHeader = [
                    ["OBJETIVOS DE POUPANÇA E RESERVAS"],
                    [],
                    ["Objetivo / Projeto", "Valor Alvo (R$)", "Valor Guardado (R$)", "Valor Restante", "Data Limite", "Meta Semanal Requerida (R$)"]
                ];
                calcs.processedSavings.forEach(s => {
                    savingsHeader.push([
                        s.name, s.target, s.currentSaved, Math.max(0, s.target - s.currentSaved), s.limitDate, s.weeklyTarget
                    ]);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(savingsHeader), "Objetivos de Poupança");

                // 3. Receitas & Ganhos
                const incomesHeader = [
                    ["FONTES DE RENDAS E GANHOS"],
                    [],
                    ["Renda / Ganho", "Valor Estimado Mensal (R$)"]
                ];
                state.incomes.forEach(i => { incomesHeader.push([i.name, parseFloat(i.value)]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(incomesHeader), "Rendas & Ganhos");

                // 4. Partilhas (Devedores)
                const loansHeader = [
                    ["CONTROLE DE PARTILHAS (DEVEDORES)"],
                    [],
                    ["Nome do Devedor", "Mercado Pago (R$)", "PicPay (R$)", "Santander (R$)", "Nio (R$)", "Total Devedor (R$)"]
                ];
                state.loans.forEach(l => {
                    const totalDevedor = parseFloat(l.MP || 0) + parseFloat(l.PP || 0) + parseFloat(l.SAN || 0) + parseFloat(l.NIO || 0);
                    loansHeader.push([
                        l.name, parseFloat(l.MP || 0), parseFloat(l.PP || 0), parseFloat(l.SAN || 0), parseFloat(l.NIO || 0), totalDevedor
                    ]);
                });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(loansHeader), "Partilhas");

                // 5. Livro Diário
                const journalHeader = [
                    ["LIVRO DIÁRIO - REGISTRO DE TRANSAÇÕES"],
                    [],
                    ["Data/Hora", "Ação", "Descrição do Evento", "Valor Associado (R$)"]
                ];
                state.history.forEach(h => { journalHeader.push([h.date, h.type.toUpperCase(), h.description, h.amount]); });
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(journalHeader), "Livro Diário");

                const d = new Date();
                const formattedDate = `${String(d.getDate()).padStart(2,'0')}_${String(d.getMonth()+1).padStart(2,'0')}_${d.getFullYear()}`;
                XLSX.writeFile(wb, `Central_Financeira_${formattedDate}.xlsx`);
                showToast("Excel exportado com sucesso!");
            } catch (err) {
                console.error(err);
                showToast("Erro ao exportar Excel.");
            }
        };

        window.saveRecord = function(e) {
            e.preventDefault();
            const type = state.modalType;

            if (type === 'cartao') {
                const name = document.getElementById('c-name').value.toUpperCase();
                const totalBill = parseFloat(document.getElementById('c-bill').value);
                const dueDay = parseInt(document.getElementById('c-day').value);
                const prepaid = parseFloat(document.getElementById('c-prepaid').value) || 0;
                
                if(state.editingId) {
                    const idx = state.cards.findIndex(c => c.id === state.editingId);
                    state.cards[idx] = { id: state.editingId, name, totalBill, dueDay, prepaid };
                    logToJournal('edicao', `Alteração do cartão ${name}. Fatura: ${formatBRL(totalBill)}.`, 0);
                } else {
                    state.cards.push({ id: Date.now().toString(), name, totalBill, dueDay, prepaid });
                    logToJournal('criacao', `Cartão ${name} cadastrado. Vencimento dia ${dueDay}.`, totalBill);
                }
                switchTab('cartoes');
            } else if (type === 'poupanca') {
                const name = document.getElementById('s-name').value.toUpperCase();
                const target = parseFloat(document.getElementById('s-target').value);
                const saved = parseFloat(document.getElementById('s-saved').value) || 0;
                const limitDate = document.getElementById('s-date').value;

                if (state.editingId) {
                    const idx = state.savings.findIndex(s => s.id === state.editingId);
                    state.savings[idx] = { id: state.editingId, name, target, saved, limitDate };
                    logToJournal('edicao', `Objetivo ${name} alterado. Alvo: ${formatBRL(target)}.`, 0);
                } else {
                    state.savings.push({ id: Date.now().toString(), name, target, saved, limitDate });
                    logToJournal('criacao', `Objetivo ${name} de poupança cadastrado para ${new Date(limitDate+'T00:00:00').toLocaleDateString('pt-BR')}.`, target);
                }
                switchTab('poupancas');
            } else if (type === 'receita') {
                const name = document.getElementById('i-name').value.toUpperCase();
                const value = parseFloat(document.getElementById('i-value').value);

                if (state.editingId) {
                    const idx = state.incomes.findIndex(i => i.id === state.editingId);
                    state.incomes[idx] = { id: state.editingId, name, value };
                    logToJournal('edicao', `Ganho ${name} alterado para ${formatBRL(value)}.`, value);
                } else {
                    state.incomes.push({ id: Date.now().toString(), name, value });
                    logToJournal('criacao', `Nova receita cadastrada: ${name} de ${formatBRL(value)}.`, value);
                }
                switchTab('receitas');
            } else if (type === 'partilha') {
                const name = document.getElementById('l-name').value.toUpperCase();
                const MP = parseFloat(document.getElementById('l-mp').value) || 0;
                const PP = parseFloat(document.getElementById('l-pp').value) || 0;
                const SAN = parseFloat(document.getElementById('l-san').value) || 0;
                const NIO = parseFloat(document.getElementById('l-nio').value) || 0;
                const sum = MP + PP + SAN + NIO;

                if(state.editingId) {
                    const idx = state.loans.findIndex(l => l.id === state.editingId);
                    state.loans[idx] = { id: state.editingId, name, MP, PP, SAN, NIO };
                    logToJournal('edicao', `Atualização da partilha de ${name}. Total devedor: ${formatBRL(sum)}.`, 0);
                } else {
                    state.loans.push({ id: Date.now().toString(), name, MP, PP, SAN, NIO });
                    logToJournal('criacao', `Nova partilha registrada para ${name}. Valor em dívida: ${formatBRL(sum)}.`, 0);
                }
                switchTab('receitas');
            } else if (type === 'diario') {
                const name = document.getElementById('d-name').value.toUpperCase();
                const amount = parseFloat(document.getElementById('d-amount').value);
                const dateStr = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }) + ' - ' + new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

                state.dailyExpenses.unshift({ id: Date.now().toString(), name, amount, date: dateStr });
                logToJournal('adiantamento', `Gasto diário registrado em caixa: ${name}.`, -amount);
                switchTab('diarios');
            }

            saveState();
            closeAddModal();
            showToast('Salvo com sucesso!');
        }

        // --- SISTEMAS DE EDIÇÃO ---
        window.editCard = function(id) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            openAddModal(); state.editingId = id; setModalType('cartao');
            document.getElementById('c-name').value = c.name;
            document.getElementById('c-bill').value = c.totalBill;
            document.getElementById('c-day').value = c.dueDay;
            document.getElementById('c-prepaid').value = c.prepaid || 0;
        }

        window.deleteCard = function(id) {
            const c = state.cards.find(i => i.id === id);
            if (c && confirm(`Deseja remover o cartão ${c.name}?`)) {
                logToJournal('remocao', `Remoção do cartão ${c.name}.`, -c.totalBill);
                state.cards = state.cards.filter(i => i.id !== id);
                saveState(); renderActiveTab();
            }
        }

        window.editSavings = function(id) {
            const s = state.savings.find(item => item.id === id);
            if (!s) return;
            openAddModal(); state.editingId = id; setModalType('poupanca');
            document.getElementById('s-name').value = s.name;
            document.getElementById('s-target').value = s.target;
            document.getElementById('s-saved').value = s.saved || 0;
            document.getElementById('s-date').value = s.limitDate;
        }

        window.deleteSavings = function(id) {
            const s = state.savings.find(i => i.id === id);
            if (s && confirm(`Remover o objetivo ${s.name}?`)) {
                logToJournal('remocao', `Objetivo de poupança removido: ${s.name}.`, -s.target);
                state.savings = state.savings.filter(i => i.id !== id);
                saveState(); renderActiveTab();
            }
        }

        window.quickAddSavings = function(id) {
            const amountStr = prompt("Quanto deseja poupar e adicionar agora?");
            const amount = parseFloat(amountStr) || 0;
            if (amount <= 0) return;

            const idx = state.savings.findIndex(s => s.id === id);
            if (idx !== -1) {
                state.savings[idx].saved = (parseFloat(state.savings[idx].saved) || 0) + amount;
                logToJournal('adiantamento', `Depósito de poupança adicionado ao objetivo ${state.savings[idx].name}.`, amount);
                saveState(); renderActiveTab();
                showToast("Poupança adicionada com sucesso!");
            }
        }

        window.editIncome = function(id) {
            const i = state.incomes.find(item => item.id === id);
            if (!i) return;
            openAddModal(); state.editingId = id; setModalType('receita');
            document.getElementById('i-name').value = i.name;
            document.getElementById('i-value').value = i.value;
        }

        window.deleteIncome = function(id) {
            const i = state.incomes.find(item => item.id === id);
            if (i && confirm(`Remover receita de ${i.name}?`)) {
                logToJournal('remocao', `Receita removida: ${i.name}.`, -i.value);
                state.incomes = state.incomes.filter(item => item.id !== id);
                saveState(); renderActiveTab();
            }
        }

        window.editLoan = function(id) {
            const l = state.loans.find(item => item.id === id);
            if (!l) return;
            openAddModal(); state.editingId = id; setModalType('partilha');
            document.getElementById('l-name').value = l.name;
            document.getElementById('l-mp').value = l.MP;
            document.getElementById('l-pp').value = l.PP;
            document.getElementById('l-san').value = l.SAN;
            document.getElementById('l-nio').value = l.NIO;
        }

        window.deleteLoan = function(id) {
            const loanObj = state.loans.find(i => i.id === id);
            if (loanObj && confirm(`Remover devedor ${loanObj.name}?`)) {
                const total = parseFloat(loanObj.MP || 0) + parseFloat(loanObj.PP || 0) + parseFloat(loanObj.SAN || 0) + parseFloat(loanObj.NIO || 0);
                logToJournal('remocao', `Remoção do registro de devedor: ${loanObj.name}.`, -total);
                state.loans = state.loans.filter(i => i.id !== id);
                saveState(); renderActiveTab();
            }
        }

        window.deleteDailyExpense = function(id) {
            const e = state.dailyExpenses.find(item => item.id === id);
            if (e && confirm(`Remover gasto diário de ${e.name}?`)) {
                logToJournal('remocao', `Gasto diário removido: ${e.name}.`, e.amount);
                state.dailyExpenses = state.dailyExpenses.filter(item => item.id !== id);
                saveState(); renderActiveTab();
            }
        }

        // --- SISTEMA DE MODAL DE ADIANTAMENTO RÁPIDO (DÉBITO/PIX) ---
        window.openPayModal = function(id, name) {
            const c = state.cards.find(item => item.id === id);
            if (!c) return;
            document.getElementById('pay-card-id').value = id;
            document.getElementById('pay-card-label').textContent = `Adiantar Cartão: ${name} (Fatura Atual: ${formatBRL(c.totalBill)})`;
            document.getElementById('pay-amount').value = '';
            document.getElementById('pay-modal').classList.add('open');
        }

        window.closePayModal = function() { document.getElementById('pay-modal').classList.remove('open'); }
        window.handlePayOverlayClick = function(e) { if (e.target.id === 'pay-modal') closePayModal(); }

        window.submitPayment = function(e) {
            e.preventDefault();
            const id = document.getElementById('pay-card-id').value;
            const amount = parseFloat(document.getElementById('pay-amount').value) || 0;

            const idx = state.cards.findIndex(c => c.id === id);
            if (idx !== -1) {
                const currentPrepaid = parseFloat(state.cards[idx].prepaid || 0);
                state.cards[idx].prepaid = currentPrepaid + amount;
                logToJournal('adiantamento', `Adiantamento via Débito/Pix efetuado no cartão ${state.cards[idx].name}.`, amount);
                saveState();
                closePayModal();
                showToast(`Pago ${formatBRL(amount)} no débito!`);
                renderActiveTab();
            }
        }

        window.onload = function() {
            const realToday = getRealTodayString();
            simulatedTodayStr = realToday;
            localStorage.setItem('simulated_today', realToday);
            updateSimulatedToday(realToday);
        };
    </script>
</body>
</html>
